<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salem DBS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap');
:root{--bg:#0E1117;--sur:#161B26;--card:#1C2333;--bord:#2A3348;--gold:#D4A843;--glt:#F0CF89;--gdim:#8A6A20;--txt:#E8E2D5;--mut:#8A95A8}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeUp .3s ease}
.spin{display:inline-block;width:18px;height:18px;border:2px solid #333;border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
#wrap{display:flex;height:100vh;overflow:hidden}
#sb{width:230px;min-width:230px;background:var(--sur);border-right:1px solid var(--bord);display:flex;flex-direction:column;height:100vh;overflow-y:auto;z-index:100}
#main{flex:1;overflow:auto;background:var(--bg);min-width:0}
#mbar{display:none;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--sur);border-bottom:1px solid var(--bord);position:sticky;top:0;z-index:10}
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
@media(max-width:720px){
  #sb{position:fixed;left:-230px;top:0;bottom:0;transition:left .25s}
  #sb.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.5)}
  #ov.show{display:block}
  #mbar{display:flex!important}
}
.page{padding:20px 16px;max-width:840px;margin:0 auto}
.sb-logo{padding:16px;border-bottom:1px solid var(--bord);display:flex;align-items:center;gap:10px}
.cross-box{width:36px;height:36px;background:linear-gradient(135deg,var(--gdim),var(--gold));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-usr{padding:12px 16px;border-bottom:1px solid var(--bord);background:rgba(212,168,67,.04)}
.sb-nav{flex:1;padding:8px}
.nb{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:8px;font-size:13px;color:var(--mut);cursor:pointer;border:none;background:none;text-align:left;border-left:2px solid transparent;font-family:'Inter',sans-serif;margin-bottom:2px;transition:all .15s}
.nb:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.nb.on{color:var(--gold);background:rgba(212,168,67,.1);border-left-color:var(--gold);font-weight:600}
.sb-ft{padding:8px;border-top:1px solid var(--bord)}
.card{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:18px}
.inp{width:100%;background:var(--sur);border:1.5px solid var(--bord);border-radius:8px;padding:11px 13px;font-size:14px;color:var(--txt);outline:none;font-family:'Inter',sans-serif;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.lbl{display:block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin-bottom:6px}
.btn{padding:11px 18px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:'Inter',sans-serif}
.bg{background:linear-gradient(135deg,var(--gdim),var(--gold));color:#0E1117}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err-box{background:rgba(160,74,58,.15);border:1px solid rgba(160,74,58,.35);border-radius:8px;padding:10px 13px;font-size:13px;color:#E88A80}
.tabs{display:flex;background:var(--sur);border-radius:8px;padding:3px;gap:3px;margin-bottom:16px}
.tab{flex:1;padding:9px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--mut);font-family:'Inter',sans-serif}
.tab.on{background:var(--gold);color:#0E1117}
.sr{font-family:'Cormorant Garamond',serif}
.h1{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:700;color:var(--glt);margin-bottom:4px}
.mu{color:var(--mut);font-size:13px}
.pill{display:inline-block;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid;cursor:pointer;font-family:'Inter',sans-serif}
.qt{background:rgba(212,168,67,.06);border-left:3px solid var(--gold);border-radius:6px;padding:12px 14px;font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;color:var(--glt);line-height:1.75}
.bt{font-size:14px;line-height:1.8;color:#C8C0B0}
.hi{background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:13px 15px;cursor:pointer;margin-bottom:8px;transition:border-color .2s}
.hi:hover,.hi.ex{border-color:var(--gold)}
.sc{background:var(--card);border:1px solid var(--bord);border-radius:12px;padding:15px;border-top:3px solid}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0E1117,#161B26 50%,#1A1530);padding:20px 16px}
.lc{width:100%;max-width:380px;background:var(--card);border:1px solid var(--bord);border-radius:16px;padding:30px 24px}
</style>
</head>
<body>

<!-- Layout principal — toujours présent dans le DOM -->
<div id="wrap" style="display:none">
  <aside id="sb">
    <div class="sb-logo">
      <div class="cross-box">✝</div>
      <div>
        <div class="sr" style="font-size:18px;font-weight:700;color:var(--glt)">Salem DBS</div>
        <div style="font-size:10px;color:var(--mut);letter-spacing:1px">DÉCOUVERTE BIBLIQUE</div>
      </div>
    </div>
    <div class="sb-usr" id="sb-usr"></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-ft">
      <button class="nb" onclick="logout()" style="width:100%"><span>🚪</span>Déconnexion</button>
    </div>
  </aside>
  <div id="ov" onclick="closeSB()"></div>
  <div id="main">
    <div id="mbar">
      <div class="sr" style="font-size:18px;font-weight:700;color:var(--glt)">✝ Salem DBS</div>
      <button onclick="openSB()" style="background:none;border:none;color:var(--txt);font-size:22px;cursor:pointer">☰</button>
    </div>
    <div id="pc"></div>
  </div>
</div>

<!-- Login — affiché par défaut -->
<div id="login-wrap" class="lw">
  <div class="lc">
    <div style="text-align:center;margin-bottom:22px">
      <div style="display:inline-flex;width:48px;height:48px;background:linear-gradient(135deg,var(--gdim),var(--gold));border-radius:13px;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px">✝</div>
      <div class="sr" style="font-size:25px;font-weight:700;color:var(--glt)">Salem DBS</div>
      <div style="font-size:11px;color:var(--mut);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px">Découverte Biblique & Spirituelle</div>
    </div>
    <div class="tabs">
      <button class="tab on" id="tl" onclick="stab('l')">Connexion</button>
      <button class="tab" id="tr" onclick="stab('r')">Inscription</button>
    </div>
    <div id="aerr"></div>
    <div id="rfields" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div><label class="lbl">Prénom</label><input class="inp" id="ifn" placeholder="Jean"/></div>
        <div><label class="lbl">Nom</label><input class="inp" id="iln" placeholder="Pierre"/></div>
      </div>
    </div>
    <div style="margin-bottom:12px"><label class="lbl">Email</label><input class="inp" id="iem" type="email" placeholder="nom@email.com" onkeydown="if(event.key==='Enter')doAuth()"/></div>
    <div style="margin-bottom:12px"><label class="lbl">Mot de passe</label><input class="inp" id="ipw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"/></div>
    <div id="cpwf" style="display:none;margin-bottom:12px"><label class="lbl">Confirmer</label><input class="inp" id="icpw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"/></div>
    <button class="btn bg" id="abtn" onclick="doAuth()" style="width:100%;justify-content:center;padding:12px">→ Se connecter</button>
    <div style="text-align:center;margin-top:14px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--gold);opacity:.8">"Ta parole est une lampe à mes pieds" — Ps 119:105</div>
  </div>
</div>

<script>
// ─── FIREBASE REST API ─────────────────────
const API_KEY  = 'AIzaSyBjmJHuNe0GjblwBrP1Rakqr9HgZcfgYT8';
const DB_URL   = 'https://salem-dbs-default-rtdb.firebaseio.com';
const AUTH_URL = 'https://identitytoolkit.googleapis.com/v1/accounts';

let _tok=null, _uid=null;

async function fbSignIn(email,pw){
  const r=await fetch(`${AUTH_URL}:signInWithPassword?key=${API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw,returnSecureToken:true})});
  const d=await r.json();
  if(!r.ok) throw d.error?.message||'ERREUR';
  _tok=d.idToken; _uid=d.localId;
  try{localStorage.setItem('sdbs',JSON.stringify({t:_tok,u:_uid,exp:Date.now()+3500000}));}catch(e){}
  return d;
}

async function fbSignUp(email,pw){
  const r=await fetch(`${AUTH_URL}:signUp?key=${API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw,returnSecureToken:true})});
  const d=await r.json();
  if(!r.ok) throw d.error?.message||'ERREUR';
  _tok=d.idToken; _uid=d.localId;
  try{localStorage.setItem('sdbs',JSON.stringify({t:_tok,u:_uid,exp:Date.now()+3500000}));}catch(e){}
  return d;
}

function fbOut(){
  _tok=null;_uid=null;
  try{localStorage.removeItem('sdbs');}catch(e){}
}

function restoreSession(){
  try{
    const s=JSON.parse(localStorage.getItem('sdbs')||'null');
    if(s&&Date.now()<s.exp){_tok=s.t;_uid=s.u;return true;}
  }catch(e){}
  return false;
}

async function dbGet(path){
  const r=await fetch(`${DB_URL}/${path}.json?auth=${_tok}`);
  return await r.json();
}
async function dbSet(path,data){
  await fetch(`${DB_URL}/${path}.json?auth=${_tok}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
}
async function dbPush(path,data){
  const r=await fetch(`${DB_URL}/${path}.json?auth=${_tok}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
  return await r.json();
}

// ─── STATE ────────────────────────────────
let profile=null, page='dashboard';
let studies=[], histAll=[], histExp=null;
let etudeRes=null, activeSec='texte';

// ─── UTILS ────────────────────────────────
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function fade(el){el.classList.remove('fade');void el.offsetWidth;el.classList.add('fade')}

// ─── SIDEBAR ──────────────────────────────
window.openSB=()=>{$('sb').classList.add('open');$('ov').classList.add('show')};
window.closeSB=()=>{$('sb').classList.remove('open');$('ov').classList.remove('show')};

const NAV=[
  {id:'dashboard',ic:'⊞',lb:'Tableau de bord'},
  {id:'etudes',ic:'📖',lb:'Études Bibliques'},
  {id:'pastoral',ic:'🎙',lb:'Module Pastoral'},
  {id:'formation',ic:'🎓',lb:'Formation'},
  {id:'historique',ic:'🕐',lb:'Historique'},
  {id:'profil',ic:'👤',lb:'Mon Profil'},
];

function rSB(){
  const rm={SUPER_ADMIN:'⭐ Super Admin',CHURCH_ADMIN:'🏛 Admin',PASTOR:'✝ Pasteur',USER:'📖 Croyant'};
  $('sb-usr').innerHTML=`<div style="font-size:13px;font-weight:600;color:var(--txt)">${esc(profile?.firstName)} ${esc(profile?.lastName)}</div><div style="font-size:11px;color:var(--gold);margin-top:2px">${rm[profile?.role]||'📖 Croyant'}</div>`;
  $('sb-nav').innerHTML=NAV.map(n=>`<button class="nb${page===n.id?' on':''}" onclick="gp('${n.id}')"><span style="width:20px;text-align:center">${n.ic}</span>${n.lb}</button>`).join('');
}

window.gp=function(id){page=id;rSB();closeSB();rPage()};

// ─── LOGIN / AUTH ─────────────────────────
function showLogin(){
  $('wrap').style.display='none';
  $('login-wrap').style.display='flex';
}

function showApp(){
  $('login-wrap').style.display='none';
  $('wrap').style.display='flex';
}

window.stab=function(t){
  window._lt=t;
  $('tl').classList.toggle('on',t==='l');
  $('tr').classList.toggle('on',t==='r');
  $('rfields').style.display=t==='r'?'block':'none';
  $('cpwf').style.display=t==='r'?'block':'none';
  $('abtn').textContent=t==='l'?'→ Se connecter':'→ Créer mon compte';
  $('aerr').innerHTML='';
};
window._lt='l';

window.doAuth=async function(){
  const btn=$('abtn'),errEl=$('aerr');
  errEl.innerHTML='';btn.disabled=true;
  btn.innerHTML='<div class="spin"></div> Patientez...';
  try{
    const em=($('iem').value||'').trim(),pw=$('ipw').value||'';
    if(!em||!pw) throw 'Remplissez tous les champs';
    if(window._lt==='l'){
      await fbSignIn(em,pw);
      await loadProfil();
    } else {
      const fn=($('ifn').value||'').trim(),ln=($('iln').value||'').trim(),cpw=$('icpw').value||'';
      if(!fn||!ln) throw 'Entrez votre prénom et nom';
      if(pw!==cpw) throw 'Les mots de passe sont différents';
      if(pw.length<6) throw 'Minimum 6 caractères';
      await fbSignUp(em,pw);
      const ud={uid:_uid,firstName:fn,lastName:ln,email:em,role:'USER',createdAt:new Date().toISOString()};
      await dbSet(`users/${_uid}`,ud);
      profile=ud;
      enterApp();
    }
  }catch(e){
    const msgs={
      'EMAIL_NOT_FOUND':'Compte introuvable',
      'INVALID_PASSWORD':'Mot de passe incorrect',
      'INVALID_LOGIN_CREDENTIALS':'Email ou mot de passe incorrect',
      'EMAIL_EXISTS':'Email déjà utilisé',
      'WEAK_PASSWORD : Password should be at least 6 characters':'Minimum 6 caractères',
    };
    const msg=typeof e==='string'?e:(msgs[e]||e);
    errEl.innerHTML=`<div class="err-box" style="margin-bottom:12px">⚠ ${esc(msg)}</div>`;
    btn.disabled=false;
    btn.textContent=window._lt==='l'?'→ Se connecter':'→ Créer mon compte';
  }
};

async function loadProfil(){
  try{const d=await dbGet(`users/${_uid}`);profile=d||{uid:_uid,firstName:'Utilisateur',lastName:'',role:'USER'};}
  catch(e){profile={uid:_uid,firstName:'Utilisateur',lastName:'',role:'USER'};}
  enterApp();
}

function enterApp(){
  showApp();
  page='dashboard';
  rSB();
  rPage();
}

window.logout=function(){
  fbOut();profile=null;studies=[];histAll=[];etudeRes=null;
  showLogin();
};

// ─── ROUTER ───────────────────────────────
function rPage(){
  const el=$('pc');if(!el)return;
  const fn={
    dashboard:pgDash,etudes:pgEtudes,historique:pgHist,
    pastoral:()=>pgCS('🎙','Module Pastoral','Génération de sermons et plans évangélisation','#7A4A9A'),
    formation:()=>pgCS('🎓','Formation','Parcours disciples','#4A7FA5'),
    profil:()=>pgCS('👤','Mon Profil','Données personnelles et ecclésiastiques','#4A8A5A'),
    eglises:()=>pgCS('⛪','Gestion des Églises','Administration des congrégations','#D4A843'),
    membres:()=>pgCS('👥','Gestion des Membres','Registre complet','#A07A3A'),
  };
  el.innerHTML=(fn[page]||pgDash)();
  fade(el);
  if(page==='dashboard')initDash();
  if(page==='etudes')initEtudes();
  if(page==='historique')initHist();
}

// ─── DASHBOARD ────────────────────────────
function pgDash(){
  const h=new Date().getHours();
  const gr=h<12?'Bonjour':h<18?'Bon après-midi':'Bonsoir';
  return `<div class="page fade">
<div style="margin-bottom:18px"><div class="h1">${gr}, ${esc(profile?.firstName)} 👋</div><div class="mu">Que la Parole de Dieu éclaire votre journée</div></div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px">
  <div class="sc" style="border-top-color:#D4A843"><div style="font-size:20px;margin-bottom:4px">📖</div><div class="sr" style="font-size:22px;font-weight:700;color:#D4A843" id="s1">—</div><div style="font-size:11px;color:var(--mut)">Études</div></div>
  <div class="sc" style="border-top-color:#4A7FA5"><div style="font-size:20px;margin-bottom:4px">📅</div><div class="sr" style="font-size:22px;font-weight:700;color:#4A7FA5" id="s2">—</div><div style="font-size:11px;color:var(--mut)">Semaine</div></div>
  <div class="sc" style="border-top-color:#7A4A9A"><div style="font-size:20px;margin-bottom:4px">✝</div><div class="sr" style="font-size:13px;font-weight:700;color:#7A4A9A;margin-top:4px">${profile?.role==='PASTOR'?'Pasteur':profile?.role==='SUPER_ADMIN'?'Admin':'Croyant'}</div><div style="font-size:11px;color:var(--mut);margin-top:3px">Rôle</div></div>
</div>
<div class="mu" style="font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:9px">Actions rapides</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px">
  ${[['📖','Nouvelle étude','etudes','#D4A843'],['🎙','Sermon','pastoral','#7A4A9A'],['🎓','Formation','formation','#4A7FA5'],['🕐','Historique','historique','#4A8A5A']].map(([ic,lb,pg,co])=>`
  <button onclick="gp('${pg}')" style="display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--bord);border-radius:10px;padding:12px;cursor:pointer;text-align:left;width:100%" onmouseover="this.style.borderColor='${co}'" onmouseout="this.style.borderColor='var(--bord)'">
    <div style="width:36px;height:36px;border-radius:8px;background:${co}22;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${ic}</div>
    <div style="font-size:13px;font-weight:600;color:var(--txt)">${lb}</div>
  </button>`).join('')}
</div>
<div class="mu" style="font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:9px">Études récentes</div>
<div id="rl"><div class="mu">Chargement…</div></div>
<div style="margin-top:16px;background:rgba(212,168,67,.06);border-left:3px solid var(--gold);border-radius:10px;padding:14px">
  <div style="font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold);margin-bottom:7px">✝ Verset du jour</div>
  <div class="sr" style="font-size:16px;font-style:italic;color:var(--txt);line-height:1.75;margin-bottom:6px">"Car je connais les projets que j'ai formés sur vous, dit l'Éternel, projets de paix et non de malheur, afin de vous donner un avenir et de l'espérance."</div>
  <div style="font-size:12px;color:var(--mut)">Jérémie 29:11</div>
</div>
</div>`;
}

async function initDash(){
  try{const d=await dbGet(`studies/${_uid}`);studies=d&&typeof d==='object'?Object.values(d).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)):[];}catch(e){studies=[];}
  const s1=$('s1'),s2=$('s2'),rl=$('rl');if(!s1)return;
  const wk=studies.filter(s=>new Date(s.createdAt)>new Date(Date.now()-7*86400000)).length;
  s1.textContent=studies.length;s2.textContent=wk;
  if(!studies.length){
    rl.innerHTML=`<div class="card" style="text-align:center;padding:24px"><div style="font-size:28px;margin-bottom:9px">📖</div><div class="mu" style="margin-bottom:11px">Aucune étude réalisée</div><button class="btn bg" onclick="gp('etudes')">→ Commencer</button></div>`;
  }else{
    rl.innerHTML=studies.slice(0,4).map(s=>`<div class="hi" onclick="gp('historique')"><div style="display:flex;justify-content:space-between;align-items:center;gap:10px"><div><div class="sr" style="font-size:16px;font-weight:700;color:var(--glt)">✝ ${esc(s.reference)}</div><div style="font-size:12px;color:var(--mut);margin-top:2px">${esc((s.ideeGenerale||'').slice(0,80))}…</div></div><div style="font-size:11px;color:#4A5568;white-space:nowrap">${new Date(s.createdAt).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}</div></div></div>`).join('');
  }
}

// ─── ÉTUDES ───────────────────────────────
const SC=[
  {k:'texte',ic:'📜',lb:'Texte biblique',co:'#D4A843'},
  {k:'contexteHistorique',ic:'🏛',lb:'Contexte historique',co:'#4A7FA5'},
  {k:'contexteLitteraire',ic:'📚',lb:'Contexte littéraire',co:'#7A4A9A'},
  {k:'analyseExegetique',ic:'🔍',lb:'Analyse exégétique',co:'#4A8A5A'},
  {k:'analyseHermeneutique',ic:'🔑',lb:'Herméneutique',co:'#A07A3A'},
  {k:'analyseTheologique',ic:'✝',lb:'Théologie',co:'#D4A843'},
  {k:'analysePentecotiste',ic:'🔥',lb:'Pentecôtiste',co:'#A04A3A'},
  {k:'applicationPratique',ic:'🌱',lb:'Application',co:'#4A8A5A'},
  {k:'referencesCroisees',ic:'🔗',lb:'Réf. croisées',co:'#4A7FA5'},
  {k:'questionsReflexion',ic:'💭',lb:'Questions',co:'#7A4A9A'},
  {k:'planEnseignement',ic:'📋',lb:"Plan d'enseig.",co:'#8A6A20'},
];

function pgEtudes(){
  return `<div class="page fade">
<div style="margin-bottom:14px"><div class="h1">📖 Études Bibliques</div><div class="mu">Analyse complète pentecôtiste par IA</div></div>
<div class="card" style="margin-bottom:14px">
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <input class="inp" id="er" style="flex:1;min-width:150px;font-family:'Cormorant Garamond',serif;font-size:16px" placeholder="Ex: Jean 3:16 ou Romains 8:28" onkeydown="if(event.key==='Enter')lA()"/>
    <select class="inp" id="el" style="width:auto;cursor:pointer"><option value="fr">🇫🇷 Français</option><option value="ht">🇭🇹 Kreyòl</option></select>
    <button class="btn bg" id="eb" onclick="lA()" style="white-space:nowrap">⚡ Analyser</button>
  </div>
  <div id="ee" style="margin-top:8px"></div>
</div>
<div id="eres"></div>
</div>`;
}

function initEtudes(){if(etudeRes)showRes(etudeRes);}

window.lA=async function(){
  const rv=($('er')?.value||'').trim(),lang=$('el')?.value||'fr';
  const ee=$('ee'),btn=$('eb'),res=$('eres');
  if(!rv){ee.innerHTML='<div class="err-box">⚠ Entrez une référence biblique</div>';return}
  ee.innerHTML='';res.innerHTML='';btn.disabled=true;
  btn.innerHTML='<div class="spin" style="border-top-color:#0E1117"></div> Analyse...';
  activeSec='texte';
  const ll=lang==='fr'?'français':'créole haïtien';
  const prompt=`Tu es un théologien pentecôtiste évangélique expert en exégèse et herméneutique biblique. Analyse le passage : "${rv}". Réponds en ${ll}, UNIQUEMENT en JSON valide sans markdown.
JSON: {"reference":"","texte":"texte complet Louis Segond","auteur":"","dateRedaction":"","destinataires":"","ideeGenerale":"message central","contexteHistorique":"","contexteLitteraire":"","analyseExegetique":{"structure":"","motsCles":["","",""],"sensOriginal":"","intentionAuteur":""},"analyseHermeneutique":"","analyseTheologique":{"dieu":"","christ":"","salut":"","saintEsprit":"","eglise":""},"analysePentecotiste":{"baptemeSaintEsprit":"","donsSpirituels":"","sanctification":"","revival":"","mission":""},"applicationPratique":{"viePersonnelle":"","vieFamiliale":"","vieMinisterielle":"","vieMissionnaire":""},"referencesCroisees":["","",""],"questionsReflexion":["","",""],"planEnseignement":{"titre":"","introduction":"","points":["","",""],"conclusion":""}}`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':(['sk-ant-a','pi03-jrM_BpwA0oND9zxxp8yZVbIv3P7HkbpiEvjJV-FPjhNU_2R_m59mHW_p_XeG42htJX3eO7Ltx4KDJCGxGuKExw-JCsTcgAA'].join('')),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:8000,messages:[{role:'user',content:prompt}]})});
    if(!r.ok){const errData=await r.json();throw new Error(`API ${r.status}: ${JSON.stringify(errData?.error||errData)}`);}
    const data=await r.json();
    const raw=data.content.map(c=>c.text||'').join('');
    let p;try{p=JSON.parse(raw.replace(/```json|```/g,'').trim());}catch(e){throw new Error('Réponse invalide');}
    const study={...p,langue:lang,createdAt:new Date().toISOString()};
    etudeRes=study;
    try{await dbPush(`studies/${_uid}`,study);studies.unshift(study);}catch(e){}
    showRes(study);
  }catch(e){ee.innerHTML=`<div class="err-box">⚠ ${esc(e.message||'Erreur connexion')}</div>`;}
  finally{btn.disabled=false;btn.innerHTML='⚡ Analyser';}
};

function showRes(st){
  const el=$('eres');if(!el)return;
  const cfg=SC.find(s=>s.k===activeSec)||SC[0];
  el.innerHTML=`
<div class="card fade" style="border-top:3px solid var(--gold);margin-bottom:11px">
  <div class="sr" style="font-size:22px;font-weight:700;color:var(--glt);margin-bottom:4px">✝ ${esc(st.reference)}</div>
  <div style="font-size:13px;color:#C8C0B0;font-style:italic;line-height:1.6;margin-bottom:10px">${esc(st.ideeGenerale)}</div>
  <div style="display:flex;flex-wrap:wrap;gap:10px">
    ${[{l:'Auteur',v:st.auteur},{l:'Date',v:st.dateRedaction},{l:'Destinataires',v:st.destinataires}].map(m=>`<div><span style="font-size:10px;color:var(--mut);text-transform:uppercase">${m.l}: </span><span style="font-size:12px;color:var(--gold);font-weight:500">${esc(m.v)}</span></div>`).join('')}
  </div>
</div>
<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
  ${SC.map(s=>`<button onclick="sS('${s.k}')" class="pill" style="border-color:${activeSec===s.k?s.co:'var(--bord)'};color:${activeSec===s.k?s.co:'var(--mut)'};background:${activeSec===s.k?s.co+'22':'var(--card)'};font-weight:${activeSec===s.k?600:400}">${s.ic} ${s.lb}</button>`).join('')}
</div>
<div class="card fade" style="border-top:3px solid ${cfg.co}">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:19px">${cfg.ic}</span><div class="sr" style="font-size:18px;font-weight:700;color:var(--glt)">${cfg.lb}</div></div>
  ${rVal(activeSec,st[activeSec])}
</div>`;
}

window.sS=function(k){activeSec=k;showRes(etudeRes);};

function rVal(k,v){
  if(v==null)return '<div style="color:var(--mut);font-style:italic">Non disponible</div>';
  if(typeof v==='string')return `<div class="bt">${esc(v)}</div>`;
  if(Array.isArray(v))return v.map((x,i)=>`<div style="padding:8px 11px;background:rgba(255,255,255,.03);border-radius:6px;border-left:2px solid var(--gold);font-size:13px;color:#C8C0B0;line-height:1.6;margin-bottom:6px">${k==='questionsReflexion'?`${i+1}. `:''}${esc(x)}</div>`).join('');
  if(typeof v==='object')return Object.entries(v).map(([key,val])=>`<div style="margin-bottom:12px"><div style="font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:5px">${esc(key.replace(/([A-Z])/g,' $1').trim())}</div>${Array.isArray(val)?val.map(x=>`<span style="display:inline-block;margin:0 4px 4px 0;padding:4px 10px;background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.2);border-radius:20px;font-size:12px;color:var(--gold)">${esc(x)}</span>`).join(''):`<div class="bt">${esc(val)}</div>`}</div>`).join('');
  return '';
}

// ─── HISTORIQUE ───────────────────────────
function pgHist(){
  return `<div class="page fade">
<div style="margin-bottom:14px"><div class="h1">🕐 Historique</div><div class="mu" id="hc">Chargement…</div></div>
<input class="inp" id="hs" placeholder="Rechercher…" oninput="fH()" style="margin-bottom:12px"/>
<div id="hl"><div style="display:flex;justify-content:center;padding:32px"><div class="spin" style="width:24px;height:24px"></div></div></div>
</div>`;
}

async function initHist(){
  try{const d=await dbGet(`studies/${_uid}`);histAll=d&&typeof d==='object'?Object.entries(d).map(([id,v])=>({id,...v})).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)):[];}catch(e){histAll=[];}
  const c=$('hc');if(c)c.textContent=`${histAll.length} étude${histAll.length!==1?'s':''} au total`;
  rH(histAll);
}

window.fH=function(){
  const q=($('hs')?.value||'').toLowerCase();
  rH(q?histAll.filter(s=>(s.reference||'').toLowerCase().includes(q)||(s.ideeGenerale||'').toLowerCase().includes(q)):histAll);
};

function rH(list){
  const el=$('hl');if(!el)return;
  if(!list.length){el.innerHTML='<div class="card" style="text-align:center;padding:30px;color:var(--mut)"><div style="font-size:28px;margin-bottom:9px">📭</div>Aucune étude trouvée</div>';return;}
  el.innerHTML=list.map(s=>`
<div class="hi${histExp===s.id?' ex':''}" onclick="tH('${s.id}')">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
    <div><div class="sr" style="font-size:16px;font-weight:700;color:var(--glt)">✝ ${esc(s.reference)}</div><div style="font-size:12px;color:var(--mut);margin-top:2px;line-height:1.5">${esc((s.ideeGenerale||'').slice(0,100))}${(s.ideeGenerale||'').length>100?'…':''}</div></div>
    <div style="font-size:11px;color:#4A5568;white-space:nowrap">${new Date(s.createdAt).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})}</div>
  </div>
  ${histExp===s.id?`<div class="fade" style="margin-top:11px;border-top:1px solid var(--bord);padding-top:11px">
    ${s.texte?`<div class="qt" style="margin-bottom:11px">${esc(s.texte)}</div>`:''}
    ${s.applicationPratique?.viePersonnelle?`<div style="margin-bottom:9px"><div style="font-size:10px;font-weight:600;text-transform:uppercase;color:#4A8A5A;margin-bottom:4px">🌱 Application personnelle</div><div class="bt">${esc(s.applicationPratique.viePersonnelle)}</div></div>`:''}
    ${s.planEnseignement?.titre?`<div style="background:var(--sur);border-radius:7px;padding:10px;font-size:13px;color:#C8C0B0"><span style="color:var(--gold);font-weight:600">Plan: </span>${esc(s.planEnseignement.titre)}</div>`:''}
  </div>`:''}
</div>`).join('');
}

window.tH=function(id){
  histExp=histExp===id?null:id;
  const q=($('hs')?.value||'').toLowerCase();
  rH(q?histAll.filter(s=>(s.reference||'').toLowerCase().includes(q)):histAll);
};

// ─── COMING SOON ──────────────────────────
function pgCS(ic,ti,ds,co){
  return `<div class="page fade"><div class="h1">${ic} ${esc(ti)}</div><div class="mu" style="margin-bottom:20px">${esc(ds)}</div>
<div class="card" style="text-align:center;padding:38px 18px;border-top:3px solid ${co}">
  <div style="font-size:40px;margin-bottom:12px">${ic}</div>
  <div class="sr" style="font-size:20px;font-weight:700;color:var(--glt);margin-bottom:9px">Module en développement</div>
  <div style="font-size:14px;color:var(--mut);max-width:300px;margin:0 auto;line-height:1.7">Disponible dans la prochaine version de Salem DBS.</div>
  <div style="display:inline-block;margin-top:13px;padding:6px 16px;border-radius:20px;background:${co}22;border:1px solid ${co}44;font-size:12px;color:${co};font-weight:600">Phase 2 — Prochainement</div>
</div></div>`;
}

// ─── BOOT ─────────────────────────────────
if(restoreSession()){
  loadProfil();
}else{
  showLogin();
}
</script>
