<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PAEDS — Plateforme Administrative Église de Dieu Salem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#070b16;
  --navy-900:#0c1326;
  --navy-800:#121b36;
  --navy-700:#1a2547;
  --navy-600:#243161;
  --navy-border:#27315a;
  --gold:#d4af37;
  --gold-bright:#f0cc5e;
  --gold-dim:#9c7f2c;
  --ink:#e9ecf5;
  --ink-dim:#9aa3c0;
  --ink-faint:#6b7393;
  --ok:#3fb97f;
  --warn:#e0a432;
  --danger:#e0584f;
  --radius:14px;
  --shadow:0 12px 32px rgba(0,0,0,.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(ellipse at top right, #101b3a 0%, var(--navy-950) 55%);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
h1,h2,h3,.font-display{font-family:'Playfair Display',serif;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--navy-600);border-radius:8px;}

/* ---------- Loading ---------- */
#loadingScreen{
  position:fixed;inset:0;background:var(--navy-950);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;
}
.crest{
  width:64px;height:64px;border-radius:50%;
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:800;font-size:26px;color:var(--gold);
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,.35)}50%{box-shadow:0 0 0 14px rgba(212,175,55,0)}}
.loading-label{color:var(--ink-dim);font-size:13px;letter-spacing:.12em;text-transform:uppercase;}

/* ---------- Auth screen ---------- */
#authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{
  width:100%;max-width:420px;background:linear-gradient(180deg,var(--navy-800),var(--navy-900));
  border:1px solid var(--navy-border);border-radius:var(--radius);padding:36px 28px;box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.auth-card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.auth-head{text-align:center;margin-bottom:28px;}
.auth-head .crest{margin:0 auto 14px;}
.auth-head h1{font-size:21px;color:var(--ink);margin:0 0 4px;letter-spacing:.01em;}
.auth-head p{font-size:12.5px;color:var(--ink-faint);margin:0;letter-spacing:.06em;text-transform:uppercase;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;}
.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;background:var(--navy-700);border:1px solid var(--navy-border);
  border-radius:10px;color:var(--ink);font-size:14.5px;outline:none;transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold-dim);}
.field textarea{resize:vertical;min-height:80px;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 18px;border-radius:10px;border:none;font-weight:600;font-size:14px;letter-spacing:.01em;
  transition:transform .12s, box-shadow .12s, opacity .12s;
}
.btn:active{transform:scale(.97);}
.btn-gold{background:linear-gradient(135deg,var(--gold-bright),var(--gold-dim));color:#1a1505;box-shadow:0 6px 16px rgba(212,175,55,.25);}
.btn-ghost{background:transparent;border:1px solid var(--navy-border);color:var(--ink-dim);}
.btn-block{width:100%;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:8px 12px;font-size:12.5px;border-radius:8px;}
.auth-error{
  background:rgba(224,88,79,.12);border:1px solid rgba(224,88,79,.35);color:#f0a39c;
  padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;
}
.auth-foot{margin-top:18px;text-align:center;font-size:12px;color:var(--ink-faint);}

/* ---------- App shell ---------- */
#appShell{display:none;min-height:100vh;}
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:240px;background:var(--navy-900);
  border-right:1px solid var(--navy-border);display:flex;flex-direction:column;z-index:50;
  transition:transform .25s;
}
.sidebar-brand{padding:22px 18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--navy-border);}
.sidebar-brand .crest{width:38px;height:38px;font-size:16px;}
.sidebar-brand-text{line-height:1.2;}
.sidebar-brand-text b{display:block;font-size:13.5px;color:var(--ink);font-family:'Playfair Display',serif;}
.sidebar-brand-text span{font-size:10px;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase;}
.nav-group{padding:14px 10px;overflow-y:auto;flex:1;}
.nav-label{font-size:10.5px;color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase;padding:10px 10px 6px;}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;
  color:var(--ink-dim);font-size:13.5px;font-weight:500;margin-bottom:2px;cursor:pointer;
  border:1px solid transparent;
}
.nav-item:hover{background:var(--navy-800);color:var(--ink);}
.nav-item.active{background:rgba(212,175,55,.1);border-color:rgba(212,175,55,.3);color:var(--gold-bright);}
.nav-item .ic{width:18px;text-align:center;font-size:15px;}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;}
.sidebar-foot{padding:14px;border-top:1px solid var(--navy-border);}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;background:var(--navy-800);}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--navy-600);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold);border:1px solid var(--gold-dim);flex-shrink:0;}
.user-meta{line-height:1.25;overflow:hidden;}
.user-meta b{display:block;font-size:12.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-meta span{font-size:10.5px;color:var(--ink-faint);}
.logout-btn{margin-top:8px;width:100%;background:none;border:1px solid var(--navy-border);color:var(--ink-faint);padding:8px;border-radius:8px;font-size:12px;}

.main{margin-left:240px;min-height:100vh;}
.topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
  padding:14px 24px;background:rgba(7,11,22,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--navy-border);
}
.menu-toggle{display:none;background:none;border:1px solid var(--navy-border);color:var(--ink);width:36px;height:36px;border-radius:8px;font-size:16px;}
.topbar h2{font-size:18px;margin:0;color:var(--ink);flex:1;}
.topbar .search-mini{position:relative;}
.topbar .search-mini input{
  background:var(--navy-800);border:1px solid var(--navy-border);border-radius:9px;
  padding:9px 12px 9px 32px;color:var(--ink);font-size:13px;width:200px;
}
.topbar .search-mini .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:13px;}
.icon-btn{width:38px;height:38px;border-radius:9px;background:var(--navy-800);border:1px solid var(--navy-border);color:var(--ink-dim);position:relative;font-size:15px;}
.icon-btn .dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--danger);display:none;}

.content{padding:22px 24px 60px;max-width:1320px;}
.view{display:none;}
.view.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
#ministryGrid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr));}
.stat-card{
  background:linear-gradient(165deg,var(--navy-800),var(--navy-900));border:1px solid var(--navy-border);
  border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;
}
.stat-card .num{font-family:'Playfair Display',serif;font-size:30px;color:var(--gold-bright);font-weight:700;line-height:1;}
.stat-card .lbl{font-size:12px;color:var(--ink-dim);margin-top:8px;}
.stat-card .ic{position:absolute;right:14px;top:14px;font-size:20px;opacity:.25;}

.panel{
  background:linear-gradient(165deg,var(--navy-800),var(--navy-900));border:1px solid var(--navy-border);
  border-radius:var(--radius);padding:20px;margin-bottom:18px;
}
.panel-head{display:flex;align-items:center;justify-content:between;gap:10px;margin-bottom:16px;}
.panel-head h3{font-size:15.5px;margin:0;flex:1;color:var(--ink);}
.panel-head .panel-sub{font-size:12px;color:var(--ink-faint);}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--ink-faint);font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--navy-border);}
td{padding:10px;border-bottom:1px solid rgba(39,49,90,.5);color:var(--ink-dim);}
tr:hover td{background:rgba(255,255,255,.02);}
.table-wrap{overflow-x:auto;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-ok{background:rgba(63,185,127,.15);color:var(--ok);}
.badge-warn{background:rgba(224,164,50,.15);color:var(--warn);}
.badge-danger{background:rgba(224,88,79,.15);color:var(--danger);}
.badge-gold{background:rgba(212,175,55,.15);color:var(--gold-bright);}
.badge-mute{background:var(--navy-700);color:var(--ink-faint);}

.empty-state{text-align:center;padding:50px 20px;color:var(--ink-faint);}
.empty-state .ic{font-size:36px;margin-bottom:10px;opacity:.5;}
.empty-state p{font-size:13px;margin:4px 0 0;}

.fab{position:fixed;bottom:24px;right:24px;z-index:30;}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(4,6,14,.7);backdrop-filter:blur(3px);
  display:none;align-items:flex-start;justify-content:center;z-index:200;padding:30px 16px;overflow-y:auto;
}
.modal-overlay.open{display:flex;}
.modal{
  width:100%;max-width:560px;background:linear-gradient(180deg,var(--navy-800),var(--navy-900));
  border:1px solid var(--navy-border);border-radius:var(--radius);box-shadow:var(--shadow);
  margin:auto;
}
.modal-head{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--navy-border);}
.modal-head h3{margin:0;font-size:16px;flex:1;}
.modal-close{background:none;border:none;color:var(--ink-faint);font-size:20px;width:30px;height:30px;}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--navy-border);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
@media(max-width:480px){.grid2{grid-template-columns:1fr;}}

.toast-stack{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{background:var(--navy-700);border:1px solid var(--navy-border);color:var(--ink);padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);animation:toastin .2s ease;}
.toast.ok{border-color:rgba(63,185,127,.4);}
.toast.err{border-color:rgba(224,88,79,.4);}
@keyframes toastin{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

.tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.tag-filter{padding:6px 13px;border-radius:20px;font-size:12px;border:1px solid var(--navy-border);color:var(--ink-dim);background:var(--navy-800);}
.tag-filter.active{background:rgba(212,175,55,.15);border-color:var(--gold-dim);color:var(--gold-bright);}

.print-only{display:none;}
@media print{
  body *{visibility:hidden;}
  #printArea,#printArea *{visibility:visible;}
  #printArea{position:absolute;top:0;left:0;width:100%;padding:30px;background:#fff;color:#000;}
}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:none;}
  .main{margin-left:0;}
  .menu-toggle{display:inline-flex;align-items:center;justify-content:center;}
  .topbar .search-mini{display:none;}
}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45;}
.scrim.open{display:block;}

.helper{font-size:11.5px;color:var(--ink-faint);margin-top:5px;}
hr.sep{border:none;border-top:1px solid var(--navy-border);margin:16px 0;}
</style>
</head>

<!-- AUTH -->

<script>
/* Journal technique silencieux (visible uniquement dans les outils développeur du navigateur) */
function dbg(msg, isError){
  if(isError) console.error('[PAEDS]', msg);
}
window.addEventListener('error', function(e){
  dbg('ERREUR JS : ' + e.message + ' (' + (e.filename||'?').split('/').pop() + ':' + (e.lineno||'?') + ')', true);
});
window.addEventListener('unhandledrejection', function(e){
  dbg('ERREUR PROMESSE : ' + ((e.reason && e.reason.message) ? e.reason.message : JSON.stringify(e.reason)), true);
});
</script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script>
/* ====================== FIREBASE INIT ====================== */
const firebaseConfig = {
  apiKey: "AIzaSyBjmJHuNe0GjblwBrP1Rakqr9HgZcfgYT8",
  authDomain: "salem-dbs.firebaseapp.com",
  databaseURL: "https://salem-dbs-default-rtdb.firebaseio.com",
  projectId: "salem-dbs",
  storageBucket: "salem-dbs.firebasestorage.app",
  messagingSenderId: "1018849656489",
  appId: "1:1018849656489:web:283f7174c426a7302373b8"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
const ROOT = "paeds"; // racine dédiée pour isoler PAEDS du reste du projet salem-dbs
const R = (path) => db.ref(`${ROOT}/${path}`);

let currentUser = null;   // {uid, email}
let currentProfile = null; // {role, nom, ministereId, ...}
let currentView = "dashboard";
let unsubscribers = [];

/* ====================== UTIL ====================== */
function toast(msg, type){
  const stack = document.getElementById('toastStack');
  const t = document.createElement('div');
  t.className = 'toast ' + (type||'');
  t.textContent = msg;
  stack.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 3200);
}
function uid(prefix){ return (prefix||'id') + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function fmtMoney(n){ if(n===undefined||n===null||n==='') return '—'; return Number(n).toLocaleString('fr-FR')+' G'; }
function esc(s){ return (s===undefined||s===null)?'':String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){ if(!name) return '--'; return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function genPassword(){ const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789'; let p=''; for(let i=0;i<10;i++) p+=chars[Math.floor(Math.random()*chars.length)]; return p; }
function slugify(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }

function logAction(action, details){
  R('journal').push({ action, details: details||'', uid: currentUser?currentUser.uid:'system', nom: currentProfile?currentProfile.nom:'système', ts: Date.now() });
}

/* ====================== FILE D'ATTENTE WHATSAPP ====================== */
// Chaque événement important pousse un message dans paeds/notifications_whatsapp/.
// L'administrateur peut copier/envoyer manuellement chaque message, ou configurer
// un webhook (Cloud Function, Make.com, Zapier, etc.) qui lira cette file et enverra
// automatiquement via l'API WhatsApp Business. Voir DEPLOIEMENT.md pour les options.
async function queueWhatsApp(destinataireNom, telephone, message, type){
  const entry = {
    destinataireNom: destinataireNom || '—', telephone: telephone || '', message, type,
    statut: 'en_attente', createdAt: Date.now()
  };
  const ref = await R('notifications_whatsapp').push(entry);
  // Tentative d'envoi automatique si un webhook est configuré (facultatif, échoue silencieusement)
  try{
    const cfgSnap = await R('config/whatsappWebhookUrl').once('value');
    const url = cfgSnap.val();
    if(url){
      fetch(url, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({telephone, message, type, id: ref.key})
      }).then(()=> ref.update({statut:'envoye_auto'})).catch(()=>{});
    }
  }catch(e){ /* pas de config webhook, message reste en file pour envoi manuel */ }
}

/* Vérifie les mandats du comité arrivant à expiration (30/15/7/1/0 jours) et met en file
   une notification unique par palier grâce au champ notifiedMilestones stocké sur le membre. */
async function checkMandateExpirations(){
  if(!isAdmin()) return; // écrit dans membres/ — seul l'admin a les droits d'écriture sur ce nœud
  const snap = await R('membres').once('value');
  const today = new Date(); today.setHours(0,0,0,0);
  const paliers = [30,15,7,1,0];
  snap.forEach(c=>{
    const m = c.val();
    if(m.categorie !== 'comite' || !m.dateFin) return;
    const fin = new Date(m.dateFin); fin.setHours(0,0,0,0);
    const joursRestants = Math.round((fin-today)/86400000);
    if(!paliers.includes(joursRestants)) return;
    const deja = m.notifiedMilestones || {};
    if(deja[joursRestants]) return;
    const label = joursRestants===0 ? 'Fin de mandat aujourd\'hui' : `Mandat expire dans ${joursRestants} jour(s)`;
    const msg = `Bonjour, ${label} pour ${m.prenom||''} ${m.nom} (${m.fonction}). Veuillez vous connecter à PAEDS pour la suite.`;
    queueWhatsApp('Comité — '+m.fonction, '', msg, 'fin_mandat');
    R('membres/'+c.key+'/notifiedMilestones/'+joursRestants).set(true);
  });
}

/* Vérifie les activités dont la date est passée sans qu'un rapport ait été soumis,
   et alerte le ministère concerné une seule fois par activité (flag rapportAlertSent). */
async function checkOverdueActivityReports(){
  if(!isAdmin() && !isPasteur()) return;
  const [actSnap, repSnap, minSnap] = await Promise.all([
    R('activites').once('value'), R('rapports').once('value'), R('ministeres').once('value')
  ]);
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().slice(0,10);
  let ministeres = {}; minSnap.forEach(c=>ministeres[c.key]=c.val());
  let rapporteesIds = new Set();
  repSnap.forEach(c=>{ const v=c.val(); if(v.activiteId) rapporteesIds.add(v.activiteId); });

  actSnap.forEach(c=>{
    const a = c.val();
    if(!a.date || a.date >= todayStr) return;
    if(a.statut === 'annulee' || a.statut === 'reportee') return;
    if(a.ministereId === 'general') return;
    if(rapporteesIds.has(c.key)) return;
    if(a.rapportAlertSent) return;
    const m = ministeres[a.ministereId];
    if(!m || m.statut === 'suspendu') return;
    queueWhatsApp(m.nom, m.whatsapp||m.telephone,
      `⚠️ Rapport en retard : l'activité "${a.titre}" du ${fmtDate(a.date)} est passée sans rapport soumis. Merci de le soumettre rapidement sur PAEDS.`,
      'rapport_retard');
    R('activites/'+c.key).update({rapportAlertSent: true});
  });
}

const MOIS_FR = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
function moisLabelFr(moisKey){ // "2026-06" -> "juin 2026"
  const [y,m] = moisKey.split('-');
  return MOIS_FR[parseInt(m,10)-1] + ' ' + y;
}
function isLastDayOfMonth(date){
  const t = new Date(date); t.setDate(t.getDate()+1);
  return t.getMonth() !== date.getMonth();
}

/* Vérifie que chaque ministère actif a soumis son rapport mensuel pour le mois précédent
   (toujours vérifié, pour rattraper les retards) et pour le mois en cours si on est
   précisément à son dernier jour. Une seule alerte par ministère et par mois. */
async function checkMonthlyReports(){
  if(!isAdmin()) return; // écrit dans ministeres/ — seul l'admin a les droits d'écriture sur ce nœud
  const today = new Date();
  const monthsToCheck = [];
  const prevMonthDate = new Date(today.getFullYear(), today.getMonth()-1, 1);
  monthsToCheck.push(prevMonthDate.toISOString().slice(0,7));
  if(isLastDayOfMonth(today)) monthsToCheck.push(today.toISOString().slice(0,7));

  const [minSnap, repSnap] = await Promise.all([R('ministeres').once('value'), R('rapports').once('value')]);
  let ministeres = []; minSnap.forEach(c=>ministeres.push({id:c.key,...c.val()}));
  let soumis = {}; // clé: ministereId|mois
  repSnap.forEach(c=>{ const v=c.val(); if(v.type==='mensuel' && v.mois && v.ministereId) soumis[v.ministereId+'|'+v.mois] = true; });

  for(const m of ministeres){
    if(m.statut === 'suspendu') continue;
    for(const mois of monthsToCheck){
      if(soumis[m.id+'|'+mois]) continue;
      const alertKey = 'alerteMensuelle_' + mois;
      if(m[alertKey]) continue;
      queueWhatsApp(m.nom, m.whatsapp||m.telephone,
        `⚠️ Rapport mensuel manquant : le ministère n'a pas encore soumis son rapport mensuel pour ${moisLabelFr(mois)}. Merci de le soumettre sur PAEDS.`,
        'rapport_mensuel_manquant');
      await R('ministeres/'+m.id).update({[alertKey]: true});
    }
  }
}

let searchTimer=null;
async function runGlobalSearch(q){
  clearTimeout(searchTimer);
  if(!q || q.length<2) return;
  searchTimer = setTimeout(async ()=>{
    const [minSnap, actSnap, memSnap, repSnap] = await Promise.all([
      R('ministeres').once('value'), R('activites').once('value'), R('membres').once('value'), R('rapports').once('value')
    ]);
    const results = [];
    const ql = q.toLowerCase();
    minSnap.forEach(c=>{ const v=c.val(); if((v.nom||'').toLowerCase().includes(ql)) results.push({type:'Ministère',label:v.nom,go:()=>navTo('ministeres')}); });
    actSnap.forEach(c=>{ const v=c.val(); if((v.titre||'').toLowerCase().includes(ql)) results.push({type:'Activité',label:v.titre,go:()=>navTo('activites')}); });
    memSnap.forEach(c=>{ const v=c.val(); if(((v.nom||'')+' '+(v.prenom||'')).toLowerCase().includes(ql)) results.push({type:'Membre',label:(v.prenom||'')+' '+(v.nom||''),go:()=>navTo('membres')}); });
    repSnap.forEach(c=>{ const v=c.val(); if((v.nom||'').toLowerCase().includes(ql)) results.push({type:'Rapport',label:v.nom,go:()=>navTo('rapports')}); });
    showSearchResults(results.slice(0,8));
  }, 350);
}
function showSearchResults(results){
  let existing = document.getElementById('searchDropdown');
  if(existing) existing.remove();
  if(!results.length) return;
  const wrap = document.querySelector('.search-mini');

  dd.id = 'searchDropdown';
  dd.style.cssText = 'position:absolute;top:42px;right:0;width:260px;background:var(--navy-800);border:1px solid var(--navy-border);border-radius:10px;box-shadow:var(--shadow);z-index:60;overflow:hidden;';

function statutBadge(statut){
  const map = {
    planifiee:['badge-mute','Planifiée'], en_cours:['badge-warn','En cours'], terminee:['badge-ok','Terminée'],
    reportee:['badge-warn','Reportée'], annulee:['badge-danger','Annulée'],
    en_attente:['badge-warn','En attente'], approuve:['badge-ok','Approuvé'], refuse:['badge-danger','Refusé'], retourne:['badge-warn','Retourné'],
    soumis:['badge-warn','Soumis'], actif:['badge-ok','Actif'], suspendu:['badge-danger','Suspendu'], passif:['badge-mute','Passif'],
    decede:['badge-mute','Décédé'], transfere:['badge-mute','Transféré']
  };
  const [cls,label] = map[statut] || ['badge-mute', statut||'—'];
  return `<span class="badge ${cls}">${label}</span>`;
}

async function saveMinistry(existingId){
  const data = {
    nom: document.getElementById('f_nom').value.trim(),
    responsable: document.getElementById('f_responsable').value.trim(),
    dateCreation: document.getElementById('f_dateCreation').value,
    telephone: document.getElementById('f_telephone').value.trim(),
    whatsapp: document.getElementById('f_whatsapp').value.trim(),
    email: document.getElementById('f_email').value.trim(),
    description: document.getElementById('f_description').value.trim(),
    objectifs: document.getElementById('f_objectifs').value.trim(),
    verset: document.getElementById('f_verset').value.trim(),
    couleur: document.getElementById('f_couleur').value,
  };
  if(!data.nom || !data.email){ toast('Le nom et l\'email sont obligatoires.','err'); return; }

  if(existingId){
    await R('ministeres/'+existingId).update(data);
    logAction('Modification ministère', data.nom);
    toast('Ministère mis à jour.','ok');
    closeModal();
    render_ministeres();
    return;
  }

  // Création + compte responsable via instance Firebase secondaire (pour ne pas déconnecter l'admin)
  const slug = slugify(data.nom);
  const password = genPassword();
  const secondaryApp = firebase.apps.find(a=>a.name==='secondary') || firebase.initializeApp(firebaseConfig,'secondary');
  const secondaryAuth = secondaryApp.auth();
  try{
    const cred = await secondaryAuth.createUserWithEmailAndPassword(data.email, password);
    const newUid = cred.user.uid;
    await secondaryAuth.signOut();
    const minRef = R('ministeres').push();
    await minRef.set({...data, slug, statut:'actif', createdAt: Date.now()});
    await R('users/'+newUid).set({
      role:'responsable', nom:data.responsable, email:data.email, ministereId:minRef.key, statut:'actif', createdAt: Date.now()
    });
    logAction('Création ministère', data.nom);
    closeModal();
    openModal(`
      <div class="modal-head"><h3>✅ Ministère créé</h3><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <p style="color:var(--ink-dim);font-size:13.5px;">Le compte du responsable a été généré :</p>
        <div class="panel" style="margin-top:10px;">
          <div style="font-size:12px;color:var(--ink-faint);">Identifiant</div>
          <div style="font-size:15px;color:var(--gold-bright);margin-bottom:10px;">${esc(data.email)}</div>
          <div style="font-size:12px;color:var(--ink-faint);">Mot de passe temporaire</div>
          <div style="font-size:15px;color:var(--gold-bright);">${password}</div>
        </div>
        <div class="helper">Communiquez ces identifiants au responsable. Conseillez-lui de changer son mot de passe à la première connexion.</div>
      </div>
      <div class="modal-foot"><button class="btn btn-gold" onclick="closeModal();render_ministeres();">Compris</button></div>
    `);
  }catch(err){
    let msg = "Erreur lors de la création du compte.";
    if(err.code==='auth/email-already-in-use') msg="Cet email est déjà utilisé par un autre compte.";
    if(err.code==='auth/weak-password') msg="Mot de passe généré trop faible (réessayez).";
    if(err.code==='auth/invalid-email') msg="Email invalide.";
    toast(msg,'err');
  }
}

async function deleteMinistry(id){
  try{
    const usersSnap = await R('users').orderByChild('ministereId').equalTo(id).once('value');
    const removals = [];
    usersSnap.forEach(c=> removals.push(c.ref.remove()));
    await Promise.all(removals);
    await R('ministeres/'+id).remove();
    logAction('Suppression ministère', id);
    toast('Ministère supprimé.','ok');
    closeModal();
    render_ministeres();
  }catch(e){
    toast('Erreur lors de la suppression : '+e.message,'err');
  }
}

/* Firebase ne permet pas à un administrateur de définir directement le mot de passe d'un
   autre compte, pour des raisons de sécurité (seul un backend avec clé secrète le pourrait,
   ce qui exposerait tout le système si intégré côté client). La méthode sûre et standard
   est l'envoi d'un lien de réinitialisation par email à la personne concernée. */
async function sendPasswordReset(email, nomPersonne){
  if(!email){ toast('Aucun email associé à ce compte.','err'); return; }
  openModal(`
    <div class="modal-head"><h3>Changer le mot de passe</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <p style="color:var(--ink-dim);font-size:13.5px;">Pour des raisons de sécurité, un administrateur ne peut pas taper directement un nouveau mot de passe à la place de quelqu'un d'autre.</p>
      <p style="color:var(--ink-dim);font-size:13.5px;margin-top:10px;">La méthode sûre : un lien de réinitialisation sera envoyé par email à <b style="color:var(--ink);">${esc(nomPersonne||'')}</b> (${esc(email)}). En cliquant sur ce lien, la personne pourra choisir elle-même son nouveau mot de passe.</p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-gold" onclick="confirmSendPasswordReset('${email}')">Envoyer le lien</button>
    </div>
  `);
}
async function confirmSendPasswordReset(email){
  try{
    await auth.sendPasswordResetEmail(email);
    logAction('Lien de réinitialisation envoyé', email);
    toast('Lien envoyé à '+email,'ok');
    closeModal();
  }catch(e){ toast('Erreur : '+e.message,'err'); }
}
async function suspendMinistry(id, currentStatut){
  const newStatut = currentStatut==='suspendu' ? 'actif' : 'suspendu';
  await R('ministeres/'+id).update({statut:newStatut});
  const usersSnap = await R('users').orderByChild('ministereId').equalTo(id).once('value');
  usersSnap.forEach(c=> c.ref.update({statut:newStatut}));
  logAction(newStatut==='suspendu'?'Suspension ministère':'Réactivation ministère', id);
  toast(newStatut==='suspendu'?'Ministère suspendu.':'Ministère réactivé.','ok');
  closeModal();
  render_ministeres();
}

  const email = document.getElementById('f_accEmail').value.trim();
  const role = document.getElementById('f_accRole').value;
  if(!nom || !email){ toast('Le nom et l\'email sont obligatoires.','err'); return; }

  const password = genPassword();
  const secondaryApp = firebase.apps.find(a=>a.name==='secondary') || firebase.initializeApp(firebaseConfig,'secondary');
  const secondaryAuth = secondaryApp.auth();
  try{
    const cred = await secondaryAuth.createUserWithEmailAndPassword(email, password);
    const newUid = cred.user.uid;
    await secondaryAuth.signOut();
    await R('users/'+newUid).set({ role, nom, email, statut:'actif', createdAt: Date.now() });
    logAction('Création compte '+role, nom);
    closeModal();
    openModal(`
      <div class="modal-head"><h3>✅ Compte créé</h3><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <p style="color:var(--ink-dim);font-size:13.5px;">Identifiants pour ${esc(nom)} (${roleLabel(role)}) :</p>
        <div class="panel" style="margin-top:10px;">
          <div style="font-size:12px;color:var(--ink-faint);">Identifiant</div>
          <div style="font-size:15px;color:var(--gold-bright);margin-bottom:10px;">${esc(email)}</div>
          <div style="font-size:12px;color:var(--ink-faint);">Mot de passe temporaire</div>
          <div style="font-size:15px;color:var(--gold-bright);">${password}</div>
        </div>
        <div class="helper">Communique ces identifiants à la personne concernée.</div>
      </div>
      <div class="modal-foot"><button class="btn btn-gold" onclick="closeModal();render_comptes();">Compris</button></div>
    `);
  }catch(err){
    let msg = "Erreur lors de la création du compte.";
    if(err.code==='auth/email-already-in-use') msg="Cet email est déjà utilisé par un autre compte.";
    if(err.code==='auth/weak-password') msg="Mot de passe généré trop faible (réessayez).";
    if(err.code==='auth/invalid-email') msg="Email invalide.";
    toast(msg,'err');
  }
}

const TYPES_ACTIVITE = ['Evangélisation','Réunion','Camp','Jeûne','Convention','Formation','Conférence','Répétition','Visite','Action sociale','Collecte','Prière','Autre'];
function ministryLabel(mid){
  if(mid==='general') return 'Administration Générale';
  return (window._ministeresCache && window._ministeresCache[mid] && window._ministeresCache[mid].nom) || '—';
}
function canManageItem(item){
  if(isAdmin()) return true;
  if(item.ministereId === 'general') return isPasteur();
  return item.ministereId === myMinistereId();
}

async function render_activites(){
  const el = document.getElementById('contentArea');
  el.innerHTML = '<div class="empty-state"><p>Chargement…</p></div>';
  const [actSnap, minSnap] = await Promise.all([R('activites').once('value'), R('ministeres').once('value')]);
  let list = []; actSnap.forEach(c=>list.push({id:c.key,...c.val()}));
  let ministeres = {}; minSnap.forEach(c=>ministeres[c.key]=c.val());
  if(!canSeeAll()) list = list.filter(a=>a.ministereId===myMinistereId() || a.ministereId==='general');
  list.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  window._activitesCache = list; window._ministeresCache = ministeres;

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
      <div class="tag-row" id="actFilterRow">
        <span class="tag-filter active" data-f="tous" onclick="filterActivites('tous')">Toutes</span>
        <span class="tag-filter" data-f="planifiee" onclick="filterActivites('planifiee')">Planifiées</span>
        <span class="tag-filter" data-f="terminee" onclick="filterActivites('terminee')">Réalisées</span>
        <span class="tag-filter" data-f="reportee" onclick="filterActivites('reportee')">Reportées</span>
        <span class="tag-filter" data-f="annulee" onclick="filterActivites('annulee')">Annulées</span>
      </div>
      ${(isResponsable() || isAdmin() || isPasteur())?`<button class="btn btn-gold" onclick="openActivityForm()">+ Nouvelle activité</button>`:''}
    </div>
    <div id="activitesTableWrap"></div>
  `;
  renderActivitesTable(list, ministeres);
}

function filterActivites(f){
  document.querySelectorAll('#actFilterRow .tag-filter').forEach(t=>t.classList.toggle('active', t.dataset.f===f));
  const list = f==='tous' ? window._activitesCache : window._activitesCache.filter(a=>a.statut===f);
  renderActivitesTable(list, window._ministeresCache);
}

function renderActivitesTable(list, ministeres){

async function saveActivity(existingId){
  const data = {
    titre: document.getElementById('f_titre').value.trim(),
    description: document.getElementById('f_description').value.trim(),
    objectif: document.getElementById('f_objectif').value.trim(),
    type: document.getElementById('f_type').value,
    priorite: document.getElementById('f_priorite').value,
    date: document.getElementById('f_date').value,
    heure: document.getElementById('f_heure').value,
    lieu: document.getElementById('f_lieu').value.trim(),
    responsableActivite: document.getElementById('f_responsableActivite').value.trim(),
    participantsPrevus: document.getElementById('f_participantsPrevus').value,
    montantDisponible: document.getElementById('f_montantDisponible').value,
    montantDemande: document.getElementById('f_montantDemande').value,
    materiels: document.getElementById('f_materiels').value.trim(),
    programme: document.getElementById('f_programme').value.trim(),
    commentaires: document.getElementById('f_commentaires').value.trim(),
  };
  if(!data.titre || !data.date){ toast('Titre et date sont obligatoires.','err'); return; }

  if(existingId){
    await R('activites/'+existingId).update(data);
    logAction('Modification activité', data.titre);
    toast('Activité mise à jour.','ok');
  } else {
    data.ministereId = myMinistereId() || 'general';
    data.statut = 'planifiee';
    data.createdBy = currentProfile.nom;
    data.createdAt = Date.now();
    await R('activites').push(data);
    logAction('Nouvelle activité', data.titre);
    if(data.ministereId === 'general'){
      notifyAllMinisteres(`Nouvelle activité générale "${data.titre}" créée par l'administration pour le ${fmtDate(data.date)}. Consultez PAEDS pour plus de détails.`, 'activite');
    } else {
      queueWhatsApp('Administration & Pasteur', '', `Nouvelle activité "${data.titre}" créée par ${currentProfile.nom} pour le ${fmtDate(data.date)}. Consultez PAEDS pour plus de détails.`, 'activite');
    }
    toast('Activité créée.','ok');
  }
  closeModal();
  render_activites();
}

  const actSnap = await R('activites/'+activityId).once('value');

  const m = minSnap.val();
  const data = {
    activiteId: activityId, activiteTitre: a.titre, ministereId: a.ministereId, ministereNom: m.nom,

  document.getElementById('printArea').innerHTML = html;

}
function downloadAsWord(elementHtml, filename){
  const blob = new Blob(['\ufeff', `<html><head><meta charset="utf-8"></head><body>${elementHtml}</body></html>`], {type:'application/msword'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename + '.doc';
  link.click();
}

async function saveMonthlyReport(){
  const mois = document.getElementById('f_moisRapport').value;
  if(!mois){ toast('Le mois est obligatoire.','err'); return; }
  const ministereId = myMinistereId();
  // Empêche les doublons pour le même mois
  const existingSnap = await R('rapports').orderByChild('ministereId').equalTo(ministereId).once('value');
  let doublon = false;
  existingSnap.forEach(c=>{ const v=c.val(); if(v.type==='mensuel' && v.mois===mois) doublon = true; });
  if(doublon){ toast('Un rapport mensuel existe déjà pour ce mois.','err'); return; }

  const data = {
    type: 'mensuel', mois, ministereId,
    nom: 'Rapport mensuel — ' + moisLabelFr(mois),
    date: new Date().toISOString().slice(0,10),
    resume: document.getElementById('f_moisResume').value.trim(),
    resultats: document.getElementById('f_moisResultats').value.trim(),
    difficultes: document.getElementById('f_moisDifficultes').value.trim(),
    recommandations: document.getElementById('f_moisRecommandations').value.trim(),
    entrees: document.getElementById('f_moisEntrees').value,
    sorties: document.getElementById('f_moisSorties').value,
    budgetUtilise: document.getElementById('f_moisBudgetUtilise').value,
    statut: 'soumis', soumisPar: currentProfile.nom, createdAt: Date.now()
  };
  await R('rapports').push(data);
  // Efface le flag d'alerte pour ce mois puisqu'il vient d'être soumis
  await R('ministeres/'+ministereId).update({['alerteMensuelle_'+mois]: null});
  logAction('Rapport mensuel soumis', moisLabelFr(mois));
  queueWhatsApp('Pasteur', '', `Rapport mensuel de ${currentProfile.nom} soumis pour ${moisLabelFr(mois)}. En attente d'approbation sur PAEDS.`, 'rapport_mensuel');
  toast('Rapport mensuel soumis.','ok');
  closeModal();
  render_rapports();
}

let _selectedMembresMinistereId = null;
async function render_membres(){
  const el = document.getElementById('contentArea');
  el.innerHTML = '<div class="empty-state"><p>Chargement…</p></div>';
  const [membresSnap, minSnap] = await Promise.all([R('membres').once('value'), canSeeAll() ? R('ministeres').once('value') : Promise.resolve(null)]);
  let list = []; membresSnap.forEach(c=>list.push({id:c.key,...c.val()}));
  window._membresCache = list;

  if(canSeeAll()){
    let ministeresList = []; minSnap.forEach(c=>ministeresList.push({id:c.key,...c.val()}));
    ministeresList.sort((a,b)=>(a.nom||'').localeCompare(b.nom||''));
    window._membresMinisteresList = ministeresList;
    if(!_selectedMembresMinistereId && ministeresList.length) _selectedMembresMinistereId = ministeresList[0].id;

    if(!ministeresList.length){
      el.innerHTML = `<div class="empty-state"><div class="ic">⛪</div><p>Aucun ministère créé pour le moment. Crée d'abord un ministère pour pouvoir y enregistrer des membres.</p></div>`;
      return;
    }

    el.innerHTML = `
      <div class="panel" style="margin-bottom:16px;">
        <div class="panel-head"><h3>Choisir un ministère</h3></div>
        <div class="tag-row" id="membresMinistereRow">
          ${ministeresList.map(m=>`<span class="tag-filter ${m.id===_selectedMembresMinistereId?'active':''}" onclick="selectMembresMinistere('${m.id}')">${esc(m.nom)}</span>`).join('')}
        </div>
      </div>
      <div id="membresContentWrap"></div>
    `;
    renderMembresContent(list.filter(m=>m.ministereId===_selectedMembresMinistereId), _selectedMembresMinistereId);
  } else {
    list = list.filter(m=>m.ministereId===myMinistereId());
    el.innerHTML = `<div id="membresContentWrap"></div>`;
    renderMembresContent(list, myMinistereId());
  }
}

function selectMembresMinistere(id){
  _selectedMembresMinistereId = id;
  document.querySelectorAll('#membresMinistereRow .tag-filter').forEach(t=>t.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderMembresContent((window._membresCache||[]).filter(m=>m.ministereId===id), id);
}

  const wrap = document.getElementById('membresContentWrap');

      </tbody></table></div>` : `<div class="empty-state"><p>Aucun membre enregistré.</p></div>`}

  `;

function memberRowHtml(c){
  const today = new Date(); today.setHours(0,0,0,0);
  let mandatBadge = '<span class="badge badge-mute">—</span>';
  if(c.dateFin){
    const fin = new Date(c.dateFin);
    const joursRestants = Math.round((fin-today)/86400000);
    if(joursRestants < 0) mandatBadge = `<span class="badge badge-danger">Expiré</span>`;
    else if(joursRestants <= 30) mandatBadge = `<span class="badge badge-warn">${joursRestants} j restants</span>`;

async function saveMember(categorie, existingId){
  const isComite = categorie==='comite';
  const data = {
    categorie, prenom: document.getElementById('f_mPrenom').value.trim(), nom: document.getElementById('f_mNom').value.trim(),
    telephone: document.getElementById('f_mTelephone').value.trim(), adresse: document.getElementById('f_mAdresse').value.trim(),
  };
  if(isComite){
    data.fonction = document.getElementById('f_mFonction').value;
    data.dateDebut = document.getElementById('f_mDebut').value;
    data.dateFin = document.getElementById('f_mFin').value;
  } else {
    data.dateEntree = document.getElementById('f_mEntree').value;
    data.statut = document.getElementById('f_mStatut').value;
  }
  if(!data.nom){ toast('Le nom est obligatoire.','err'); return; }

  if(existingId){
    await R('membres/'+existingId).update(data);
  } else {
    const targetMinistereId = canSeeAll() ? _selectedMembresMinistereId : myMinistereId();
    if(!targetMinistereId){ toast('Sélectionne d\'abord un ministère.','err'); return; }
    data.ministereId = targetMinistereId;
    data.createdAt = Date.now();
    await R('membres').push(data);
  }
  logAction(existingId?'Modification membre':'Nouveau membre', data.nom);
  toast('Enregistré.','ok');
  closeModal();
  render_membres();
}

let calendarYear = new Date().getFullYear();
async function render_calendrier(){
  const el = document.getElementById('contentArea');
  el.innerHTML = '<div class="empty-state"><p>Chargement…</p></div>';
  const snap = await R('activites').once('value');
  let list = []; snap.forEach(c=>list.push({id:c.key,...c.val()}));
  if(!canSeeAll()) list = list.filter(a=>a.ministereId===myMinistereId() || a.ministereId==='general');
  window._calActivites = list;
  renderCalendarGrid();
}
function changeCalendarYear(delta){ calendarYear += delta; renderCalendarGrid(); }
function renderCalendarGrid(){
  const el = document.getElementById('contentArea');
  const list = window._calActivites || [];
  const moisNoms = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  let monthsHtml = '';
  for(let mIdx=0; mIdx<12; mIdx++){
    const monthActs = list.filter(a=>{ if(!a.date) return false; const d=new Date(a.date); return d.getFullYear()===calendarYear && d.getMonth()===mIdx; });
    monthActs.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    monthsHtml += `<div class="panel" style="margin-bottom:0;">
      <div class="panel-head"><h3>${moisNoms[mIdx]}</h3><span class="panel-sub">${monthActs.length}</span></div>
      ${monthActs.length ? monthActs.map(a=>`<div style="padding:7px 0;border-bottom:1px solid var(--navy-border);font-size:12.5px;display:flex;justify-content:space-between;gap:8px;">
        <span style="color:var(--ink-dim);">${new Date(a.date).getDate()} — ${esc(a.titre)}</span>${statutBadge(a.statut)}
      </div>`).join('') : `<div style="color:var(--ink-faint);font-size:12px;padding:10px 0;">Aucune activité</div>`}
    </div>`;
  }
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;">
      <button class="btn btn-ghost btn-sm" onclick="changeCalendarYear(-1)">‹</button>
      <h3 style="margin:0;font-size:18px;">${calendarYear}</h3>
      <button class="btn btn-ghost btn-sm" onclick="changeCalendarYear(1)">›</button>
      <button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="window.print()">🖨 Imprimer</button>
    </div>
    <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));">${monthsHtml}</div>
  `;
}

async function render_notifications(){

  el.innerHTML = '<div class="empty-state"><p>Chargement…</p></div>';

      <div class="panel-head"><h3>File d'attente (${enAttente.length} en attente)</h3></div>
      ${list.length ? `<div class="table-wrap"><table><thead><tr><th>Destinataire</th><th>Type</th><th>Message</th><th>Statut</th><th></th></tr></thead><tbody>
        ${list.map(n=>`<tr>
          <td><b style="color:var(--ink);">${esc(n.destinataireNom)}</b>${n.telephone?`<br><span style="font-size:11px;color:var(--ink-faint);">${esc(n.telephone)}</span>`:''}</td>
          <td><span class="badge badge-mute">${esc(n.type||'—')}</span></td>
          <td style="max-width:260px;font-size:12px;">${esc(n.message)}</td>
          <td>${n.statut==='envoye_auto'?'<span class="badge badge-ok">Envoyé (auto)</span>':n.statut==='envoye'?'<span class="badge badge-ok">Envoyé</span>':'<span class="badge badge-warn">En attente</span>'}</td>
          <td style="white-space:nowrap;">
            <button class="btn btn-ghost btn-sm" onclick="copyWhatsAppMessage('${n.id}')">📋 Copier</button>
            ${n.statut==='en_attente'?`<button class="btn btn-ghost btn-sm" onclick="markNotifSent('${n.id}')">✓ Envoyé</button>`:''}

async function saveWebhookUrl(){
  const url = document.getElementById('f_webhookUrl').value.trim();
  await R('config/whatsappWebhookUrl').set(url);
  logAction('Configuration webhook WhatsApp', url?'défini':'supprimé');
  toast('Configuration enregistrée.','ok');
}
function copyWhatsAppMessage(id){
  const n = (window._notifCache||[]).find(x=>x.id===id);
  if(!n) return;
  const text = n.telephone ? `${n.message}` : n.message;
  navigator.clipboard.writeText(text).then(()=>toast('Message copié — collez-le dans WhatsApp.','ok')).catch(()=>toast('Impossible de copier automatiquement.','err'));
}
async function markNotifSent(id){
  await R('notifications_whatsapp/'+id).update({statut:'envoye', envoyePar: currentProfile.nom, envoyeAt: Date.now()});
  toast('Marqué comme envoyé.','ok');
  render_notifications();
}

  ]);

  cultesSnap.forEach(c=>cultes.push({id:c.key,...c.val()}));
  cenesSnap.forEach(c=>cenes.push({id:c.key,...c.val()}));

  const prochainesReunions = reunions.filter(r=>r.date>=today).sort((a,b)=>(a.date||'').localeCompare(b.date||'')).slice(0,5);
  const dernierCulte = cultes.sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];
  const totalDimes = cultes.reduce((s,c)=>s+(Number(c.dimes)||0),0);
  const totalOffrandes = cultes.reduce((s,c)=>s+(Number(c.offrandes)||0),0);

  // Statistiques de présence agrégées (réunions + Sainte-Cène)
  let presenceHtml = '';
  if(membresB.length){
    const reunionsAvecPresences = reunions.filter(r=>r.presences && Object.keys(r.presences).length);
    let totalPresentsReunions = 0, totalPossibleReunions = 0;
    reunionsAvecPresences.forEach(r=>{
      Object.values(r.presences).forEach(s=>{ if(s==='present') totalPresentsReunions++; });
      totalPossibleReunions += membresB.length;
    });
    const tauxReunions = totalPossibleReunions ? Math.round(totalPresentsReunions/totalPossibleReunions*100) : 0;

    const cenesAvecPresences = cenes.filter(c=>c.presences && Object.keys(c.presences).length);
    let totalCommunies = 0, totalPossibleCenes = 0;
    cenesAvecPresences.forEach(c=>{
      Object.values(c.presences).forEach(s=>{ if(s==='communie') totalCommunies++; });
      totalPossibleCenes += membresB.length;
    });
    const tauxCenes = totalPossibleCenes ? Math.round(totalCommunies/totalPossibleCenes*100) : 0;

    if(reunionsAvecPresences.length || cenesAvecPresences.length){
      presenceHtml = `
        <div class="panel">
          <div class="panel-head"><h3>Statistiques de présence</h3></div>
          ${reunionsAvecPresences.length ? `<p style="font-size:13px;color:var(--ink-dim);">Réunions (${reunionsAvecPresences.length} avec présences enregistrées) — taux de présence moyen : <b style="color:var(--gold-bright);">${tauxReunions}%</b></p>` : ''}
          ${cenesAvecPresences.length ? `<p style="font-size:13px;color:var(--ink-dim);">Sainte-Cène (${cenesAvecPresences.length} avec présences enregistrées) — taux de communion moyen : <b style="color:var(--gold-bright);">${tauxCenes}%</b></p>` : ''}
        </div>`;
    }
  }

  wrap.innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><span class="ic">👥</span><div class="num">${membresB.length}</div><div class="lbl">Membres baptisés</div></div>
      <div class="stat-card"><span class="ic">📝</span><div class="num">${reunions.length}</div><div class="lbl">Réunions enregistrées</div></div>
      <div class="stat-card"><span class="ic">⛪</span><div class="num">${cultes.length}</div><div class="lbl">Cultes enregistrés</div></div>
      <div class="stat-card"><span class="ic">🍞</span><div class="num">${cenes.length}</div><div class="lbl">Saintes-Cènes</div></div>
      <div class="stat-card"><span class="ic">📄</span><div class="num">${pvEnAttente.length}</div><div class="lbl">PV en attente d'approbation</div></div>
      <div class="stat-card"><span class="ic">💰</span><div class="num">${fmtMoney(totalDimes+totalOffrandes)}</div><div class="lbl">Dîmes + offrandes cumulées</div></div>
    </div>
    ${presenceHtml}
    <div class="panel">
      <div class="panel-head"><h3>Prochaines réunions</h3></div>
      ${prochainesReunions.length ? prochainesReunions.map(r=>`<div style="padding:8px 0;border-bottom:1px solid var(--navy-border);font-size:13px;color:var(--ink-dim);">${fmtDate(r.date)} — ${esc(r.type||'Réunion')} (${esc(r.lieu||'—')})</div>`).join('') : `<div class="empty-state"><p>Aucune réunion à venir programmée.</p></div>`}
    </div>
    ${dernierCulte ? `<div class="panel">
      <div class="panel-head"><h3>Dernier culte enregistré</h3></div>
      <p style="font-size:13px;color:var(--ink-dim);">${fmtDate(dernierCulte.date)} — ${esc(dernierCulte.typeCulte||'Culte')} · Prédicateur : ${esc(dernierCulte.predicateur||'—')}</p>
      <p style="font-size:13px;color:var(--ink-dim);">Participants : ${Number(dernierCulte.nbHommes||0)+Number(dernierCulte.nbFemmes||0)+Number(dernierCulte.nbEnfants||0)} · Dîmes : ${fmtMoney(dernierCulte.dimes)} · Offrandes : ${fmtMoney(dernierCulte.offrandes)}</p>
    </div>` : ''}
  `;
}

async function saveReunion(existingId){
  const data = {
    type: document.getElementById('f_rnType').value,
    date: document.getElementById('f_rnDate').value,
    heureDebut: document.getElementById('f_rnHeureDebut').value,
    heureFin: document.getElementById('f_rnHeureFin').value,
    lieu: document.getElementById('f_rnLieu').value.trim(),
    president: document.getElementById('f_rnPresident').value.trim(),
    secretaire: document.getElementById('f_rnSecretaire').value.trim(),
    respMeditation: document.getElementById('f_rnMeditation').value.trim(),
    respPriere: document.getElementById('f_rnPriere').value.trim(),
    respLouange: document.getElementById('f_rnLouange').value.trim(),
    objectif: document.getElementById('f_rnObjectif').value.trim(),
    ordreJour: document.getElementById('f_rnOrdreJour').value.split('\n').map(l=>l.trim()).filter(Boolean),
    deroulement: document.getElementById('f_rnDeroulement').value.trim(),
    questionsRaw: document.getElementById('f_rnQuestions').value.trim(),
  };
  if(!data.date){ toast('La date est obligatoire.','err'); return; }
  if(existingId){
    await RG('reunions/'+existingId).update(data);
    logAction('Modification réunion', data.type);
  } else {
    data.statutApprobation = 'en_attente';
    data.presences = {};
    data.decisions = [];
    data.createdAt = Date.now();
    await RG('reunions').push(data);
    logAction('Nouvelle réunion', data.type);
    if(isPasteur()===false) queueWhatsApp('Pasteur','', `Nouvelle réunion enregistrée (${data.type}, ${fmtDate(data.date)}) — PV disponible sur PAEDS pour consultation.`, 'reunion');
  }
  toast('Réunion enregistrée.','ok');
  closeModal();
  renderRegistre_reunions();
}

async function savePresences(type, id, memberIds){
  const presences = {};
  memberIds.forEach(mid=>{ const el = document.getElementById('pres_'+mid); if(el) presences[mid] = el.value; });
  await RG(type+'/'+id+'/presences').set(presences);
  logAction('Présences enregistrées', type);

  if(type==='reunions') openReunionDetail(id); else openCeneDetail(id);

async function saveDecision(reunionId){
  const texte = document.getElementById('f_decTexte').value.trim();
  if(!texte){ toast('Le texte est obligatoire.','err'); return; }
  const snap = await RG('reunions/'+reunionId+'/decisions').once('value');
  const decisions = snap.val() || [];
  decisions.push({
    texte, responsable: document.getElementById('f_decResponsable').value.trim(),
    echeance: document.getElementById('f_decEcheance').value, statut: 'a_realiser'
  });
  await RG('reunions/'+reunionId+'/decisions').set(decisions);
  logAction('Nouvelle décision', texte);
  toast('Décision ajoutée.','ok');
  closeModal();
  openReunionDetail(reunionId);
}

      <div class="field" style="margin-top:12px;">
        <textarea id="f_importText" style="min-height:180px;font-family:monospace;font-size:12.5px;" placeholder="Jean, Pierre, M, 3712-3456, Chorale
Marie, Joseph, F, , Jeunesse
Paul, Louis, M, 3798-1122,"></textarea>
      </div>
      <div id="importPreview" style="margin-top:10px;font-size:12.5px;color:var(--ink-dim);"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-gold" onclick="previewImportMembresB()">Prévisualiser</button>
    </div>
  `);
}
function previewImportMembresB(){
  const raw = document.getElementById('f_importText').value;
  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!lines.length){ toast('Colle au moins une ligne.','err'); return; }
  const parsed = lines.map(l=>{
    const sep = l.includes('\t') ? '\t' : ',';
    const parts = l.split(sep).map(p=>p.trim());
    return { prenom: parts[0]||'', nom: parts[1]||'', sexe: (parts[2]||'').toUpperCase(), telephone: parts[3]||'', ministere: parts[4]||'' };
  }).filter(p=>p.nom || p.prenom);
  window._importPreviewData = parsed;
  const previewEl = document.getElementById('importPreview');
  previewEl.innerHTML = `
    <p style="color:var(--gold-bright);font-weight:600;">${parsed.length} membre(s) détecté(s) :</p>
    <div style="max-height:200px;overflow-y:auto;border:1px solid var(--navy-border);border-radius:8px;padding:8px;margin-top:6px;">
      ${parsed.map(p=>`<div style="padding:4px 0;border-bottom:1px solid var(--navy-border);">${esc(p.prenom)} ${esc(p.nom)} ${p.sexe?'('+esc(p.sexe)+')':''} ${p.telephone?'· '+esc(p.telephone):''} ${p.ministere?'· '+esc(p.ministere):''}</div>`).join('')}
    </div>
  `;
  const modalFoot = document.querySelector('#modalBox .modal-foot');
  if(!document.getElementById('btnConfirmImport')){
    modalFoot.insertAdjacentHTML('beforeend', `<button id="btnConfirmImport" class="btn btn-gold" onclick="confirmImportMembresB()">Importer ${parsed.length} membre(s)</button>`);
  } else {
    document.getElementById('btnConfirmImport').textContent = `Importer ${parsed.length} membre(s)`;
  }
}
async function confirmImportMembresB(){
  const parsed = window._importPreviewData || [];
  if(!parsed.length){ toast('Rien à importer.','err'); return; }
  const btn = document.getElementById('btnConfirmImport');
  btn.textContent = 'Importation…'; btn.disabled = true;
  try{
    const writes = parsed.map(p => RG('membresBaptises').push({
      prenom: p.prenom, nom: p.nom, sexe: p.sexe==='M'||p.sexe==='F'?p.sexe:'',
      telephone: p.telephone, ministere: p.ministere, statut: 'actif', createdAt: Date.now()
    }));
    await Promise.all(writes);
    logAction('Import en masse de membres baptisés', parsed.length+' membre(s)');
    toast(parsed.length+' membre(s) importé(s) avec succès.','ok');
    closeModal();
    renderRegistre_membresB();
  }catch(e){
    toast('Erreur lors de l\'import : '+e.message,'err');
    btn.textContent = 'Réessayer'; btn.disabled = false;
  }
}

/* ---------- Archives (recherche transversale) ---------- */
async function renderRegistre_archives(){
  const wrap = document.getElementById('registreTabContent');
  wrap.innerHTML = '<div class="empty-state"><p>Chargement…</p></div>';
  const [rSnap, cSnap, eSnap, ceSnap, vSnap, rvSnap, mSnap] = await Promise.all([
    RG('reunions').once('value'), RG('cultes').once('value'), RG('etudesBibliques').once('value'),
    RG('saintesCenes').once('value'), RG('veillees').once('value'), RG('reveils').once('value'), RG('missions').once('value')
  ]);
  const collect = (snap, type, labelField) => { const arr=[]; snap.forEach(c=>{ const v=c.val(); arr.push({id:c.key, type, label:v[labelField]||type, date:v.date, raw:v}); }); return arr; };
  let all = [
    ...collect(rSnap,'Réunion','type'), ...collect(cSnap,'Culte','typeCulte'), ...collect(eSnap,'Étude biblique','sujet'),
    ...collect(ceSnap,'Sainte-Cène','sujet'), ...collect(vSnap,'Veillée','dirigeant'), ...collect(rvSnap,'Réveil','sujet'),
    ...collect(mSnap,'Mission','typeMission')
  ];
  all.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  window._archivesCache = all;

  const annees = [...new Set(all.map(a=>(a.date||'').slice(0,4)).filter(Boolean))].sort().reverse();
  const types = [...new Set(all.map(a=>a.type))];

  wrap.innerHTML = `
    <div class="panel" style="margin-bottom:16px;">
      <div class="grid2">
        <div class="field"><label>Année</label><select id="f_arcAnnee" onchange="filterArchives()"><option value="">Toutes</option>${annees.map(a=>`<option value="${a}">${a}</option>`).join('')}</select></div>
        <div class="field"><label>Type</label><select id="f_arcType" onchange="filterArchives()"><option value="">Tous</option>${types.map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label>Mot-clé</label><input id="f_arcMotCle" placeholder="Rechercher…" oninput="filterArchives()"></div>
    </div>
    <div class="panel"><div class="table-wrap"><table><thead><tr><th>Type</th><th>Libellé</th><th>Date</th></tr></thead><tbody id="archivesTbody"></tbody></table></div></div>
  `;
  renderArchivesRows(all);
}
function renderArchivesRows(list){
  const tbody = document.getElementById('archivesTbody');
  tbody.innerHTML = list.length ? list.map(a=>`<tr><td><span class="badge badge-gold">${esc(a.type)}</span></td><td>${esc(a.label)}</td><td>${fmtDate(a.date)}</td></tr>`).join('') : `<tr><td colspan="3"><div class="empty-state"><p>Aucun résultat.</p></div></td></tr>`;
}
function filterArchives(){
  const annee = document.getElementById('f_arcAnnee').value;
  const type = document.getElementById('f_arcType').value;
  const motCle = document.getElementById('f_arcMotCle').value.toLowerCase();
  let list = window._archivesCache || [];
  if(annee) list = list.filter(a=>(a.date||'').startsWith(annee));
  if(type) list = list.filter(a=>a.type===type);
  if(motCle) list = list.filter(a=>JSON.stringify(a.raw).toLowerCase().includes(motCle));
  renderArchivesRows(list);
}
</script>
