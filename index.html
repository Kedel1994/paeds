<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PAEDS — Plateforme Administrative Église de Dieu Salem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy-950:#070b16;
  --navy-900:#0c1326;
  --navy-800:#121b36;
  --navy-700:#1a2547;
  --navy-600:#243161;
  --navy-border:#27315a;
  --gold:#d4af37;
  --gold-bright:#f0cc5e;
  --gold-dim:#9c7f2c;
  --ink:#e9ecf5;
  --ink-dim:#9aa3c0;
  --ink-faint:#6b7393;
  --ok:#3fb97f;
  --warn:#e0a432;
  --danger:#e0584f;
  --radius:14px;
  --shadow:0 12px 32px rgba(0,0,0,.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(ellipse at top right, #101b3a 0%, var(--navy-950) 55%);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  min-height:100vh;
  -webkit-tap-highlight-color:transparent;
}
h1,h2,h3,.font-display{font-family:'Playfair Display',serif;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--navy-600);border-radius:8px;}

/* ---------- Loading ---------- */
#loadingScreen{
  position:fixed;inset:0;background:var(--navy-950);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:9999;
}
.crest{
  width:64px;height:64px;border-radius:50%;
  border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:800;font-size:26px;color:var(--gold);
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,.35)}50%{box-shadow:0 0 0 14px rgba(212,175,55,0)}}
.loading-label{color:var(--ink-dim);font-size:13px;letter-spacing:.12em;text-transform:uppercase;}

/* ---------- Auth screen ---------- */
#authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{
  width:100%;max-width:420px;background:linear-gradient(180deg,var(--navy-800),var(--navy-900));
  border:1px solid var(--navy-border);border-radius:var(--radius);padding:36px 28px;box-shadow:var(--shadow);
  position:relative;overflow:hidden;
}
.auth-card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.auth-head{text-align:center;margin-bottom:28px;}
.auth-head .crest{margin:0 auto 14px;}
.auth-head h1{font-size:21px;color:var(--ink);margin:0 0 4px;letter-spacing:.01em;}
.auth-head p{font-size:12.5px;color:var(--ink-faint);margin:0;letter-spacing:.06em;text-transform:uppercase;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--ink-dim);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;}
.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;background:var(--navy-700);border:1px solid var(--navy-border);
  border-radius:10px;color:var(--ink);font-size:14.5px;outline:none;transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold-dim);}
.field textarea{resize:vertical;min-height:80px;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 18px;border-radius:10px;border:none;font-weight:600;font-size:14px;letter-spacing:.01em;
  transition:transform .12s, box-shadow .12s, opacity .12s;
}
.btn:active{transform:scale(.97);}
.btn-gold{background:linear-gradient(135deg,var(--gold-bright),var(--gold-dim));color:#1a1505;box-shadow:0 6px 16px rgba(212,175,55,.25);}
.btn-ghost{background:transparent;border:1px solid var(--navy-border);color:var(--ink-dim);}
.btn-block{width:100%;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:8px 12px;font-size:12.5px;border-radius:8px;}
.auth-error{
  background:rgba(224,88,79,.12);border:1px solid rgba(224,88,79,.35);color:#f0a39c;
  padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;
}
.auth-foot{margin-top:18px;text-align:center;font-size:12px;color:var(--ink-faint);}

/* ---------- App shell ---------- */
#appShell{display:none;min-height:100vh;}
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:240px;background:var(--navy-900);
  border-right:1px solid var(--navy-border);display:flex;flex-direction:column;z-index:50;
  transition:transform .25s;
}
.sidebar-brand{padding:22px 18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--navy-border);}
.sidebar-brand .crest{width:38px;height:38px;font-size:16px;}
.sidebar-brand-text{line-height:1.2;}
.sidebar-brand-text b{display:block;font-size:13.5px;color:var(--ink);font-family:'Playfair Display',serif;}
.sidebar-brand-text span{font-size:10px;color:var(--ink-faint);letter-spacing:.08em;text-transform:uppercase;}
.nav-group{padding:14px 10px;overflow-y:auto;flex:1;}
.nav-label{font-size:10.5px;color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase;padding:10px 10px 6px;}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;
  color:var(--ink-dim);font-size:13.5px;font-weight:500;margin-bottom:2px;cursor:pointer;
  border:1px solid transparent;
}
.nav-item:hover{background:var(--navy-800);color:var(--ink);}
.nav-item.active{background:rgba(212,175,55,.1);border-color:rgba(212,175,55,.3);color:var(--gold-bright);}
.nav-item .ic{width:18px;text-align:center;font-size:15px;}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;}
.sidebar-foot{padding:14px;border-top:1px solid var(--navy-border);}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;background:var(--navy-800);}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--navy-600);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--gold);border:1px solid var(--gold-dim);flex-shrink:0;}
.user-meta{line-height:1.25;overflow:hidden;}
.user-meta b{display:block;font-size:12.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-meta span{font-size:10.5px;color:var(--ink-faint);}
.logout-btn{margin-top:8px;width:100%;background:none;border:1px solid var(--navy-border);color:var(--ink-faint);padding:8px;border-radius:8px;font-size:12px;}

.main{margin-left:240px;min-height:100vh;}
.topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;
  padding:14px 24px;background:rgba(7,11,22,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--navy-border);
}
.menu-toggle{display:none;background:none;border:1px solid var(--navy-border);color:var(--ink);width:36px;height:36px;border-radius:8px;font-size:16px;}
.topbar h2{font-size:18px;margin:0;color:var(--ink);flex:1;}
.topbar .search-mini{position:relative;}
.topbar .search-mini input{
  background:var(--navy-800);border:1px solid var(--navy-border);border-radius:9px;
  padding:9px 12px 9px 32px;color:var(--ink);font-size:13px;width:200px;
}
.topbar .search-mini .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-faint);font-size:13px;}
.icon-btn{width:38px;height:38px;border-radius:9px;background:var(--navy-800);border:1px solid var(--navy-border);color:var(--ink-dim);position:relative;font-size:15px;}
.icon-btn .dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--danger);display:none;}

.content{padding:22px 24px 60px;max-width:1320px;}
.view{display:none;}
.view.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px;}
#ministryGrid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr));}
.stat-card{
  background:linear-gradient(165deg,var(--navy-800),var(--navy-900));border:1px solid var(--navy-border);
  border-radius:var(--radius);padding:18px;position:relative;overflow:hidden;
}
.stat-card .num{font-family:'Playfair Display',serif;font-size:30px;color:var(--gold-bright);font-weight:700;line-height:1;}
.stat-card .lbl{font-size:12px;color:var(--ink-dim);margin-top:8px;}
.stat-card .ic{position:absolute;right:14px;top:14px;font-size:20px;opacity:.25;}

.panel{
  background:linear-gradient(165deg,var(--navy-800),var(--navy-900));border:1px solid var(--navy-border);
  border-radius:var(--radius);padding:20px;margin-bottom:18px;
}
.panel-head{display:flex;align-items:center;justify-content:between;gap:10px;margin-bottom:16px;}
.panel-head h3{font-size:15.5px;margin:0;flex:1;color:var(--ink);}
.panel-head .panel-sub{font-size:12px;color:var(--ink-faint);}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;color:var(--ink-faint);font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--navy-border);}
td{padding:10px;border-bottom:1px solid rgba(39,49,90,.5);color:var(--ink-dim);}
tr:hover td{background:rgba(255,255,255,.02);}
.table-wrap{overflow-x:auto;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-ok{background:rgba(63,185,127,.15);color:var(--ok);}
.badge-warn{background:rgba(224,164,50,.15);color:var(--warn);}
.badge-danger{background:rgba(224,88,79,.15);color:var(--danger);}
.badge-gold{background:rgba(212,175,55,.15);color:var(--gold-bright);}
.badge-mute{background:var(--navy-700);color:var(--ink-faint);}

.empty-state{text-align:center;padding:50px 20px;color:var(--ink-faint);}
.empty-state .ic{font-size:36px;margin-bottom:10px;opacity:.5;}
.empty-state p{font-size:13px;margin:4px 0 0;}

.fab{position:fixed;bottom:24px;right:24px;z-index:30;}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(4,6,14,.7);backdrop-filter:blur(3px);
  display:none;align-items:flex-start;justify-content:center;z-index:200;padding:30px 16px;overflow-y:auto;
}
.modal-overlay.open{display:flex;}
.modal{
  width:100%;max-width:560px;background:linear-gradient(180deg,var(--navy-800),var(--navy-900));
  border:1px solid var(--navy-border);border-radius:var(--radius);box-shadow:var(--shadow);
  margin:auto;
}
.modal-head{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--navy-border);}
.modal-head h3{margin:0;font-size:16px;flex:1;}
.modal-close{background:none;border:none;color:var(--ink-faint);font-size:20px;width:30px;height:30px;}
.modal-body{padding:20px;max-height:70vh;overflow-y:auto;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--navy-border);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;}
@media(max-width:480px){.grid2{grid-template-columns:1fr;}}

.toast-stack{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:500;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{background:var(--navy-700);border:1px solid var(--navy-border);color:var(--ink);padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:var(--shadow);animation:toastin .2s ease;}
.toast.ok{border-color:rgba(63,185,127,.4);}
.toast.err{border-color:rgba(224,88,79,.4);}
@keyframes toastin{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

.tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.tag-filter{padding:6px 13px;border-radius:20px;font-size:12px;border:1px solid var(--navy-border);color:var(--ink-dim);background:var(--navy-800);}
.tag-filter.active{background:rgba(212,175,55,.15);border-color:var(--gold-dim);color:var(--gold-bright);}

.print-only{display:none;}
@media print{
  body *{visibility:hidden;}
  #printArea,#printArea *{visibility:visible;}
  #printArea{position:absolute;top:0;left:0;width:100%;padding:30px;background:#fff;color:#000;}
}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:none;}
  .main{margin-left:0;}
  .menu-toggle{display:inline-flex;align-items:center;justify-content:center;}
  .topbar .search-mini{display:none;}
}
.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45;}
.scrim.open{display:block;}

.helper{font-size:11.5px;color:var(--ink-faint);margin-top:5px;}
hr.sep{border:none;border-top:1px solid var(--navy-border);margin:16px 0;}
</style>
</head>

<!-- APP SHELL -->
<div id="appShell">

<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBox"></div></div>
<div class="toast-stack" id="toastStack"></div>
<div id="printArea" class="print-only"></div>

<div id="dbgPanel" style="position:fixed;left:0;right:0;bottom:0;max-height:38px;overflow-y:auto;background:#05070f;border-top:2px solid #d4af37;font-family:monospace;font-size:11px;color:#9aa3c0;z-index:99999;padding:0;display:none;transition:max-height .2s;">
  <div id="dbgHeader" onclick="toggleDbgPanel()" style="position:sticky;top:0;background:#05070f;color:#f0cc5e;font-weight:bold;padding:8px 12px;border-bottom:1px solid #27315a;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">
    <span>🔍 Diagnostic PAEDS <span id="dbgCount" style="color:#6b7393;font-weight:normal;"></span></span>
    <span id="dbgToggleIcon">▲ agrandir</span>
  </div>
  <div id="dbgLog" style="padding:8px 12px;display:none;"></div>
</div>

<script>
/* ====================== DIAGNOSTIC PERMANENT — journal qui ne s'efface jamais ====================== */
function dbg(msg, isError){
  const panel = document.getElementById('dbgPanel');
  const log = document.getElementById('dbgLog');
  const countEl = document.getElementById('dbgCount');
  if(!panel || !log) return;
  panel.style.display = 'block';
  window._dbgCount = (window._dbgCount||0) + 1;
  if(countEl) countEl.textContent = '(' + window._dbgCount + ')';
  const t = new Date().toLocaleTimeString('fr-FR');
  const line = document.createElement('div');
  line.style.cssText = 'padding:3px 0;border-bottom:1px solid #1a2547;' + (isError?'color:#e0584f;':'color:#9aa3c0;');
  line.textContent = `[${t}] ${msg}`;
  log.appendChild(line);
  if(window._dbgExpanded) panel.scrollTop = panel.scrollHeight;
  // Reste réduit par défaut ; s'ouvre automatiquement seulement en cas d'erreur
  if(isError && !window._dbgExpanded) toggleDbgPanel(true);
}
window._dbgExpanded = false;
function toggleDbgPanel(forceOpen){
  const panel = document.getElementById('dbgPanel');
  const log = document.getElementById('dbgLog');
  const icon = document.getElementById('dbgToggleIcon');
  const willExpand = forceOpen === true ? true : !window._dbgExpanded;
  window._dbgExpanded = willExpand;
  if(willExpand){
    panel.style.maxHeight = '55vh';
    log.style.display = 'block';
    icon.textContent = '▼ réduire';
    panel.scrollTop = panel.scrollHeight;
  } else {
    panel.style.maxHeight = '38px';
    log.style.display = 'none';
    icon.textContent = '▲ agrandir';
  }
}
dbg('Script démarré.');
window.addEventListener('error', function(e){
  dbg('ERREUR JS : ' + e.message + ' (' + (e.filename||'?').split('/').pop() + ':' + (e.lineno||'?') + ')', true);
});
window.addEventListener('unhandledrejection', function(e){
  dbg('ERREUR PROMESSE : ' + ((e.reason && e.reason.message) ? e.reason.message : JSON.stringify(e.reason)), true);
});
window._authFired = false;
</script>

<script>
dbg('Après balises <script> Firebase CDN.');
/* ====================== FIREBASE INIT ====================== */
if(typeof firebase === 'undefined'){
  dbg('firebase est UNDEFINED — le SDK ne s\'est pas chargé (CDN bloqué ou pas de réseau).', true);
} else {
  dbg('SDK Firebase chargé avec succès.');
}
const firebaseConfig = {
  apiKey: "AIzaSyBjmJHuNe0GjblwBrP1Rakqr9HgZcfgYT8",
  authDomain: "salem-dbs.firebaseapp.com",
  databaseURL: "https://salem-dbs-default-rtdb.firebaseio.com",
  projectId: "salem-dbs",
  storageBucket: "salem-dbs.firebasestorage.app",
  messagingSenderId: "1018849656489",
  appId: "1:1018849656489:web:283f7174c426a7302373b8"
};
try{
  firebase.initializeApp(firebaseConfig);
  dbg('firebase.initializeApp() OK.');
}catch(e){ dbg('ERREUR initializeApp : ' + e.message, true); }
const auth = firebase.auth();
const db = firebase.database();
dbg('auth et db créés.');
const ROOT = "paeds"; // racine dédiée pour isoler PAEDS du reste du projet salem-dbs
const R = (path) => db.ref(`${ROOT}/${path}`);

// Test réseau direct, indépendant de Auth, pour vérifier l'accès à Firebase
dbg('Test de connexion réseau vers Firebase Database…');
const _testController = new AbortController();
const _testTimeout = setTimeout(()=>_testController.abort(), 6000);
fetch('https://salem-dbs-default-rtdb.firebaseio.com/.json?shallow=true', {signal:_testController.signal})
  .then(r=>{ clearTimeout(_testTimeout); dbg('Database accessible — réponse HTTP ' + r.status + '.'); })
  .catch(err=>{ clearTimeout(_testTimeout); dbg('Database INACCESSIBLE : ' + err.message, true); });

// Diagnostic si onAuthStateChanged ne répond jamais après 10s
setTimeout(function(){
  if(!window._authFired){
    dbg('⚠️ onAuthStateChanged n\'a toujours pas répondu après 10 secondes.', true);
  }
}, 10000);

let currentUser = null;   // {uid, email}
let currentProfile = null; // {role, nom, ministereId, ...}
let currentView = "dashboard";
let unsubscribers = [];

/* ====================== UTIL ====================== */
function toast(msg, type){
  const stack = document.getElementById('toastStack');
  const t = document.createElement('div');
  t.className = 'toast ' + (type||'');
  t.textContent = msg;
  stack.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 3200);
}
function uid(prefix){ return (prefix||'id') + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmtDate(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateTime(iso){ if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function fmtMoney(n){ if(n===undefined||n===null||n==='') return '—'; return Number(n).toLocaleString('fr-FR')+' G'; }
function esc(s){ return (s===undefined||s===null)?'':String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){ if(!name) return '--'; return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function genPassword(){ const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789'; let p=''; for(let i=0;i<10;i++) p+=chars[Math.floor(Math.random()*chars.length)]; return p; }
function slugify(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); }

function logAction(action, details){
  R('journal').push({ action, details: details||'', uid: currentUser?currentUser.uid:'system', nom: currentProfile?currentProfile.nom:'système', ts: Date.now() });
}

/* ====================== FILE D'ATTENTE WHATSAPP ====================== */
// Chaque événement important pousse un message dans paeds/notifications_whatsapp/.
// L'administrateur peut copier/envoyer manuellement chaque message, ou configurer
// un webhook (Cloud Function, Make.com, Zapier, etc.) qui lira cette file et enverra
// automatiquement via l'API WhatsApp Business. Voir DEPLOIEMENT.md pour les options.
async function queueWhatsApp(destinataireNom, telephone, message, type){
  const entry = {
    destinataireNom: destinataireNom || '—', telephone: telephone || '', message, type,
    statut: 'en_attente', createdAt: Date.now()
  };
  const ref = await R('notifications_whatsapp').push(entry);
  // Tentative d'envoi automatique si un webhook est configuré (facultatif, échoue silencieusement)
  try{
    const cfgSnap = await R('config/whatsappWebhookUrl').once('value');
    const url = cfgSnap.val();
    if(url){
      fetch(url, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({telephone, message, type, id: ref.key})
      }).then(()=> ref.update({statut:'envoye_auto'})).catch(()=>{});
    }
  }catch(e){ /* pas de config webhook, message reste en file pour envoi manuel */ }
}

/* Vérifie les mandats du comité arrivant à expiration (30/15/7/1/0 jours) et met en file
   une notification unique par palier grâce au champ notifiedMilestones stocké sur le membre. */
async function checkMandateExpirations(){
  if(!isAdmin() && !isPasteur()) return;
  const snap = await R('membres').once('value');
  const today = new Date(); today.setHours(0,0,0,0);
  const paliers = [30,15,7,1,0];
  snap.forEach(c=>{
    const m = c.val();
    if(m.categorie !== 'comite' || !m.dateFin) return;
    const fin = new Date(m.dateFin); fin.setHours(0,0,0,0);
    const joursRestants = Math.round((fin-today)/86400000);
    if(!paliers.includes(joursRestants)) return;
    const deja = m.notifiedMilestones || {};
    if(deja[joursRestants]) return;
    const label = joursRestants===0 ? 'Fin de mandat aujourd\'hui' : `Mandat expire dans ${joursRestants} jour(s)`;
    const msg = `Bonjour, ${label} pour ${m.prenom||''} ${m.nom} (${m.fonction}). Veuillez vous connecter à PAEDS pour la suite.`;
    queueWhatsApp('Comité — '+m.fonction, '', msg, 'fin_mandat');
    R('membres/'+c.key+'/notifiedMilestones/'+joursRestants).set(true);
  });
}

/* ====================== AUTH ====================== */
auth.onAuthStateChanged(async (user)=>{
  window._authFired = true;
  dbg('onAuthStateChanged déclenché. Utilisateur : ' + (user ? user.email : 'aucun (déconnecté)'));
  document.getElementById('loadingScreen').style.display='none';
  if(user){
    currentUser = user;
    try{
      dbg('Lecture du profil paeds/users/' + user.uid + '…');
      const snap = await R('users/'+user.uid).once('value');
      dbg('Lecture profil terminée. Existe : ' + snap.exists());
      if(!snap.exists()){
        showAuthError("Compte non reconnu dans PAEDS. Contactez l'administrateur.");
        auth.signOut();
        return;
      }
      currentProfile = snap.val();
      dbg('Profil chargé : rôle=' + currentProfile.role + ', statut=' + currentProfile.statut);
      if(currentProfile.statut === 'suspendu'){
        showAuthError("Ce compte a été suspendu. Contactez l'administrateur.");
        auth.signOut();
        return;
      }
      document.getElementById('authScreen').style.display='none';
      document.getElementById('appShell').style.display='block';
      dbg('Affichage de l\'application…');
      initAppShell();
      dbg('initAppShell() terminé avec succès.');
    }catch(e){
      dbg('ERREUR pendant le chargement du profil : ' + e.message, true);
      showAuthError("Erreur de connexion à la base de données : " + e.message);
    }
  } else {
    currentUser = null; currentProfile = null;
    document.getElementById('authScreen').style.display='flex';
    document.getElementById('appShell').style.display='none';
    dbg('Écran de connexion affiché.');
  }
});

function showAuthError(msg){
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = 'block';
}
function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pwd = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('authError');
  errEl.style.display='none';
  if(!email || !pwd){ showAuthError("Veuillez remplir tous les champs."); return; }
  dbg('Tentative de connexion : ' + email);
  const btn = document.getElementById('loginBtn');
  btn.textContent='Connexion…'; btn.disabled=true;
  auth.signInWithEmailAndPassword(email,pwd)
    .then(()=>{ dbg('signInWithEmailAndPassword() résolu avec succès.'); })
    .catch(err=>{
      dbg('ERREUR signInWithEmailAndPassword : ' + err.code + ' — ' + err.message, true);
      let msg = "Identifiants incorrects.";
      if(err.code==='auth/user-not-found') msg="Aucun compte avec cet email.";
      if(err.code==='auth/wrong-password') msg="Mot de passe incorrect.";
      if(err.code==='auth/too-many-requests') msg="Trop de tentatives. Réessayez plus tard.";
      if(err.code==='auth/invalid-email') msg="Format d'email invalide.";
      showAuthError(msg);
    })
    .finally(()=>{ btn.textContent='Se connecter'; btn.disabled=false; });
}
function doLogout(){
  unsubscribers.forEach(u=>u());
  unsubscribers=[];
  auth.signOut();
}

let searchTimer=null;
async function runGlobalSearch(q){
  clearTimeout(searchTimer);
  if(!q || q.length<2) return;
  searchTimer = setTimeout(async ()=>{
    const [minSnap, actSnap, memSnap, repSnap] = await Promise.all([
      R('ministeres').once('value'), R('activites').once('value'), R('membres').once('value'), R('rapports').once('value')
    ]);
    const results = [];
    const ql = q.toLowerCase();
    minSnap.forEach(c=>{ const v=c.val(); if((v.nom||'').toLowerCase().includes(ql)) results.push({type:'Ministère',label:v.nom,go:()=>navTo('ministeres')}); });
    actSnap.forEach(c=>{ const v=c.val(); if((v.titre||'').toLowerCase().includes(ql)) results.push({type:'Activité',label:v.titre,go:()=>navTo('activites')}); });
    memSnap.forEach(c=>{ const v=c.val(); if(((v.nom||'')+' '+(v.prenom||'')).toLowerCase().includes(ql)) results.push({type:'Membre',label:(v.prenom||'')+' '+(v.nom||''),go:()=>navTo('membres')}); });
    repSnap.forEach(c=>{ const v=c.val(); if((v.nom||'').toLowerCase().includes(ql)) results.push({type:'Rapport',label:v.nom,go:()=>navTo('rapports')}); });
    showSearchResults(results.slice(0,8));
  }, 350);
}
function showSearchResults(results){
  let existing = document.getElementById('searchDropdown');
  if(existing) existing.remove();
  if(!results.length) return;
  const wrap = document.querySelector('.search-mini');
  const dd = document.createElement('div');
  dd.id = 'searchDropdown';
  dd.style.cssText = 'position:absolute;top:42px;right:0;width:260px;background:var(--navy-800);border:1px solid var(--navy-border);border-radius:10px;box-shadow:var(--shadow);z-index:60;overflow:hidden;';
  dd.innerHTML = results.map(r=>`<div style="padding:10px 12px;border-bottom:1px solid var(--navy-border);cursor:pointer;font-size:12.5px;" onmousedown="(${r.go.toString()})(); document.getElementById('searchDropdown')?.remove();"><span style="color:var(--gold-bright);font-size:10px;text-transform:uppercase;letter-spacing:.05em;">${r.type}</span><div style="color:var(--ink);margin-top:2px;">${esc(r.label)}</div></div>`).join('');
  wrap.appendChild(dd);
}

/* ====================== DASHBOARD ====================== */
async function render_dashboard(){
  const el = document.getElementById('contentArea');
  el.innerHTML = '<div class="empty-state"><div class="ic">◈</div><p>Chargement…</p></div>';

  const [minSnap, actSnap, repSnap, finSnap, pubSnap] = await Promise.all([
    R('ministeres').once('value'), R('activites').once('value'), R('rapports').once('value'),
    R('financements').once('value'), R('publications').once('value')
  ]);

  let ministeres=[], activites=[], rapports=[], financements=[], publications=[];
  minSnap.forEach(c=>ministeres.push({id:c.key,...c.val()}));
  actSnap.forEach(c=>activites.push({id:c.key,...c.val()}));
  repSnap.forEach(c=>rapports.push({id:c.key,...c.val()}));
  finSnap.forEach(c=>financements.push({id:c.key,...c.val()}));
  pubSnap.forEach(c=>publications.push({id:c.key,...c.val()}));

  if(!canSeeAll()){
    const mid = myMinistereId();
    activites = activites.filter(a=>a.ministereId===mid);
    rapports = rapports.filter(r=>r.ministereId===mid);
    financements = financements.filter(f=>f.ministereId===mid);
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().slice(0,10);
  const activitesAVenir = activites.filter(a=>a.date===todayStr && a.statut!=='annulee');
  const activitesEnCours = activites.filter(a=>a.statut==='planifiee' || a.statut==='en_cours');
  const activitesRealisees = activites.filter(a=>a.statut==='terminee');
  const rapportsAttente = rapports.filter(r=>r.statut==='soumis');
  const demandesFinancement = financements.filter(f=>f.statut==='en_attente');
  const pubRecentes = publications.slice(-3).reverse();

  let statsHtml = '';
  if(canSeeAll()){
    statsHtml = `
      <div class="stat-grid">
        <div class="stat-card"><span class="ic">⛪</span><div class="num">${ministeres.length}</div><div class="lbl">Ministères</div></div>
        <div class="stat-card"><span class="ic">📋</span><div class="num">${activitesEnCours.length}</div><div class="lbl">Activités en cours</div></div>
        <div class="stat-card"><span class="ic">✓</span><div class="num">${activitesRealisees.length}</div><div class="lbl">Activités réalisées</div></div>
        <div class="stat-card"><span class="ic">📄</span><div class="num">${rapportsAttente.length}</div><div class="lbl">Rapports en attente</div></div>
        <div class="stat-card"><span class="ic">📅</span><div class="num">${activitesAVenir.length}</div><div class="lbl">Activités aujourd'hui</div></div>
        <div class="stat-card"><span class="ic">💰</span><div class="num">${demandesFinancement.length}</div><div class="lbl">Demandes de financement</div></div>
      </div>`;
  } else {
    statsHtml = `
      <div class="stat-grid">
        <div class="stat-card"><span class="ic">📋</span><div class="num">${activitesEnCours.length}</div><div class="lbl">Activités en cours</div></div>
        <div class="stat-card"><span class="ic">✓</span><div class="num">${activitesRealisees.length}</div><div class="lbl">Activités réalisées</div></div>
        <div class="stat-card"><span class="ic">📄</span><div class="num">${rapportsAttente.length}</div><div class="lbl">Rapports en attente</div></div>
        <div class="stat-card"><span class="ic">📅</span><div class="num">${activitesAVenir.length}</div><div class="lbl">Aujourd'hui</div></div>
      </div>`;
  }

  el.innerHTML = `
    ${statsHtml}
    <div class="panel">
      <div class="panel-head"><h3>Activités d'aujourd'hui</h3><span class="panel-sub">${fmtDate(todayStr)}</span></div>
      ${activitesAVenir.length ? `<div class="table-wrap"><table><thead><tr><th>Titre</th><th>Type</th><th>Heure</th><th>Lieu</th><th>Statut</th></tr></thead><tbody>
        ${activitesAVenir.map(a=>`<tr><td>${esc(a.titre)}</td><td>${esc(a.type)}</td><td>${esc(a.heure||'—')}</td><td>${esc(a.lieu||'—')}</td><td>${statutBadge(a.statut)}</td></tr>`).join('')}
      </tbody></table></div>` : `<div class="empty-state"><div class="ic">📅</div><p>Aucune activité prévue aujourd'hui.</p></div>`}
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Publications récentes</h3></div>
      ${pubRecentes.length ? pubRecentes.map(p=>`<div style="padding:10px 0;border-bottom:1px solid var(--navy-border);"><b style="color:var(--ink);font-size:13.5px;">${esc(p.titre)}</b><div style="color:var(--ink-faint);font-size:11.5px;margin-top:3px;">${esc(p.type||'Communiqué')} · ${fmtDate(p.date)}</div></div>`).join('') : `<div class="empty-state"><div class="ic">📢</div><p>Aucune publication récente.</p></div>`}

function statutBadge(statut){
  const map = {
    planifiee:['badge-mute','Planifiée'], en_cours:['badge-warn','En cours'], terminee:['badge-ok','Terminée'],
    reportee:['badge-warn','Reportée'], annulee:['badge-danger','Annulée'],
    en_attente:['badge-warn','En attente'], approuve:['badge-ok','Approuvé'], refuse:['badge-danger','Refusé'], retourne:['badge-warn','Retourné'],
    soumis:['badge-warn','Soumis'], actif:['badge-ok','Actif'], suspendu:['badge-danger','Suspendu'], passif:['badge-mute','Passif'],
    decede:['badge-mute','Décédé'], transfere:['badge-mute','Transféré']
  };
  const [cls,label] = map[statut] || ['badge-mute', statut||'—'];
  return `<span class="badge ${cls}">${label}</span>`;
}

async function saveMinistry(existingId){
  const data = {
    nom: document.getElementById('f_nom').value.trim(),
    responsable: document.getElementById('f_responsable').value.trim(),
    dateCreation: document.getElementById('f_dateCreation').value,
    telephone: document.getElementById('f_telephone').value.trim(),
    whatsapp: document.getElementById('f_whatsapp').value.trim(),
    email: document.getElementById('f_email').value.trim(),
    description: document.getElementById('f_description').value.trim(),
    objectifs: document.getElementById('f_objectifs').value.trim(),
    verset: document.getElementById('f_verset').value.trim(),
    couleur: document.getElementById('f_couleur').value,
  };
  if(!data.nom || !data.email){ toast('Le nom et l\'email sont obligatoires.','err'); return; }

  if(existingId){
    await R('ministeres/'+existingId).update(data);
    logAction('Modification ministère', data.nom);
    toast('Ministère mis à jour.','ok');
    closeModal();
    render_ministeres();
    return;
  }

  // Création + compte responsable via instance Firebase secondaire (pour ne pas déconnecter l'admin)
  const slug = slugify(data.nom);
  const password = genPassword();
  const secondaryApp = firebase.apps.find(a=>a.name==='secondary') || firebase.initializeApp(firebaseConfig,'secondary');
  const secondaryAuth = secondaryApp.auth();
  try{
    const cred = await secondaryAuth.createUserWithEmailAndPassword(data.email, password);
    const newUid = cred.user.uid;
    await secondaryAuth.signOut();
    const minRef = R('ministeres').push();
    await minRef.set({...data, slug, statut:'actif', createdAt: Date.now()});
    await R('users/'+newUid).set({
      role:'responsable', nom:data.responsable, email:data.email, ministereId:minRef.key, statut:'actif', createdAt: Date.now()
    });
    logAction('Création ministère', data.nom);
    closeModal();
    openModal(`
      <div class="modal-head"><h3>✅ Ministère créé</h3><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <p style="color:var(--ink-dim);font-size:13.5px;">Le compte du responsable a été généré :</p>
        <div class="panel" style="margin-top:10px;">
          <div style="font-size:12px;color:var(--ink-faint);">Identifiant</div>
          <div style="font-size:15px;color:var(--gold-bright);margin-bottom:10px;">${esc(data.email)}</div>
          <div style="font-size:12px;color:var(--ink-faint);">Mot de passe temporaire</div>
          <div style="font-size:15px;color:var(--gold-bright);">${password}</div>
        </div>
        <div class="helper">Communiquez ces identifiants au responsable. Conseillez-lui de changer son mot de passe à la première connexion.</div>
      </div>
      <div class="modal-foot"><button class="btn btn-gold" onclick="closeModal();render_ministeres();">Compris</button></div>
    `);
  }catch(err){
    let msg = "Erreur lors de la création du compte.";
    if(err.code==='auth/email-already-in-use') msg="Cet email est déjà utilisé par un autre compte.";
    if(err.code==='auth/weak-password') msg="Mot de passe généré trop faible (réessayez).";
    if(err.code==='auth/invalid-email') msg="Email invalide.";
    toast(msg,'err');
  }
}

function downloadAsWord(elementHtml, filename){
  const blob = new Blob(['\ufeff', `<html><head><meta charset="utf-8"></head><body>${elementHtml}</body></html>`], {type:'application/msword'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename + '.doc';
  link.click();
}

async function saveReport(activityId, isEvangelisation){
  const actSnap = await R('activites/'+activityId).once('value');
  const a = actSnap.val();
  const presenceLines = document.getElementById('f_repPresence').value.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const parts = l.split(',').map(p=>p.trim());
    return {nom:parts[0]||'', telephone:parts[1]||'', statut:parts[2]||'Présent'};
  });
  const data = {
    activiteId: activityId, nom: a.titre, ministereId: a.ministereId,
    date: document.getElementById('f_repDate').value, lieu: document.getElementById('f_repLieu').value.trim(),
    objectifs: document.getElementById('f_repObjectifs').value.trim(),
    resume: document.getElementById('f_repResume').value.trim(),

    difficultes: document.getElementById('f_repDifficultes').value.trim(),
    recommandations: document.getElementById('f_repRecommandations').value.trim(),

    budgetUtilise: document.getElementById('f_repBudgetUtilise').value,
    entrees: document.getElementById('f_repEntrees').value,
    sorties: document.getElementById('f_repSorties').value,
    presence: presenceLines,
    statut:'soumis', soumisPar: currentProfile.nom, createdAt: Date.now()

      conversions: document.getElementById('f_evConversions').value,

      observations: document.getElementById('f_evObservations').value.trim(),

function memberRowHtml(c){
  const today = new Date(); today.setHours(0,0,0,0);
  let mandatBadge = '<span class="badge badge-mute">—</span>';
  if(c.dateFin){
    const fin = new Date(c.dateFin);
    const joursRestants = Math.round((fin-today)/86400000);
    if(joursRestants < 0) mandatBadge = `<span class="badge badge-danger">Expiré</span>`;
    else if(joursRestants <= 30) mandatBadge = `<span class="badge badge-warn">${joursRestants} j restants</span>`;
    else mandatBadge = `<span class="badge badge-ok">Actif</span>`;
  }
  return `<tr><td><b style="color:var(--ink);">${esc(c.prenom)} ${esc(c.nom)}</b></td><td>${esc(c.fonction||'—')}</td><td>${fmtDate(c.dateDebut)}</td><td>${fmtDate(c.dateFin)}</td><td>${mandatBadge}</td>
  <td><button class="btn btn-ghost btn-sm" onclick='openMemberForm("comite", ${JSON.stringify(c).replace(/'/g,"&#39;")})'>Modifier</button></td></tr>`;
}

async function saveMember(categorie, existingId){
  const isComite = categorie==='comite';
  const data = {
    categorie, prenom: document.getElementById('f_mPrenom').value.trim(), nom: document.getElementById('f_mNom').value.trim(),
    telephone: document.getElementById('f_mTelephone').value.trim(), adresse: document.getElementById('f_mAdresse').value.trim(),
  };
  if(isComite){
    data.fonction = document.getElementById('f_mFonction').value;
    data.dateDebut = document.getElementById('f_mDebut').value;
    data.dateFin = document.getElementById('f_mFin').value;
  } else {
    data.dateEntree = document.getElementById('f_mEntree').value;
    data.statut = document.getElementById('f_mStatut').value;
  }
  if(!data.nom){ toast('Le nom est obligatoire.','err'); return; }

  if(existingId){
    await R('membres/'+existingId).update(data);
  } else {
    data.ministereId = myMinistereId() || 'admin';
    data.createdAt = Date.now();
    await R('membres').push(data);
  }
  logAction(existingId?'Modification membre':'Nouveau membre', data.nom);
  toast('Enregistré.','ok');
  closeModal();
  render_membres();
}

function changeCalendarYear(delta){ calendarYear += delta; renderCalendarGrid(); }
function renderCalendarGrid(){
  const el = document.getElementById('contentArea');
  const list = window._calActivites || [];
  const moisNoms = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  let monthsHtml = '';
  for(let mIdx=0; mIdx<12; mIdx++){
    const monthActs = list.filter(a=>{ if(!a.date) return false; const d=new Date(a.date); return d.getFullYear()===calendarYear && d.getMonth()===mIdx; });
    monthActs.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    monthsHtml += `<div class="panel" style="margin-bottom:0;">
      <div class="panel-head"><h3>${moisNoms[mIdx]}</h3><span class="panel-sub">${monthActs.length}</span></div>
      ${monthActs.length ? monthActs.map(a=>`<div style="padding:7px 0;border-bottom:1px solid var(--navy-border);font-size:12.5px;display:flex;justify-content:space-between;gap:8px;">
        <span style="color:var(--ink-dim);">${new Date(a.date).getDate()} — ${esc(a.titre)}</span>${statutBadge(a.statut)}
      </div>`).join('') : `<div style="color:var(--ink-faint);font-size:12px;padding:10px 0;">Aucune activité</div>`}
    </div>`;
  }
  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;">
      <button class="btn btn-ghost btn-sm" onclick="changeCalendarYear(-1)">‹</button>
      <h3 style="margin:0;font-size:18px;">${calendarYear}</h3>
      <button class="btn btn-ghost btn-sm" onclick="changeCalendarYear(1)">›</button>
      <button class="btn btn-ghost btn-sm" style="margin-left:auto;" onclick="window.print()">🖨 Imprimer</button>
    </div>
    <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr));">${monthsHtml}</div>
  `;
}

/* ====================== PUBLICATIONS ====================== */
async function render_publications(){
  const el = document.getElementById('contentArea');
  el.innerHTML = '<div class="empty-state"><p>Chargement…</p></div>';
  const snap = await R('publications').once('value');
  let list = []; snap.forEach(c=>list.push({id:c.key,...c.val()}));
  list.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

  el.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
      ${(isAdmin()||isPasteur())?`<button class="btn btn-gold" onclick="openPublicationForm()">+ Nouvelle publication</button>`:''}
    </div>
    ${list.length ? list.map(p=>publicationCardHtml(p)).join('') : `<div class="empty-state"><div class="ic">📢</div><p>Aucune publication.</p></div>`}
  `;
}
function publicationCardHtml(p){
  const vu = p.vuPar && p.vuPar[currentUser.uid];
  return `<div class="panel" onclick="markPublicationSeen('${p.id}')" style="cursor:pointer;">
    <div style="display:flex;justify-content:space-between;align-items:start;gap:10px;">
      <div>
        <span class="badge badge-gold">${esc(p.type||'Communiqué')}</span>
        <h3 style="margin:8px 0 4px;font-size:15.5px;">${esc(p.titre)}</h3>
        <div style="font-size:11.5px;color:var(--ink-faint);">${fmtDate(p.date)} · par ${esc(p.auteur||'—')}</div>
      </div>
      ${!vu?'<span class="badge badge-warn">Nouveau</span>':''}
    </div>
    <p style="color:var(--ink-dim);font-size:13px;margin-top:10px;">${esc(p.contenu||'')}</p>
  </div>`;
}
function openPublicationForm(){
  openModal(`
    <div class="modal-head"><h3>Nouvelle publication</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Titre</label><input id="f_pubTitre"></div>
      <div class="field"><label>Type</label><select id="f_pubType">${['Décision','Communiqué','Calendrier','Ordre du jour','Document','Rapport','Note pastorale'].map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div class="field"><label>Contenu</label><textarea id="f_pubContenu" style="min-height:120px;"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-gold" onclick="savePublication()">Publier</button>
    </div>
  `);
}
async function savePublication(){
  const titre = document.getElementById('f_pubTitre').value.trim();
  if(!titre){ toast('Le titre est obligatoire.','err'); return; }
  await R('publications').push({
    titre, type: document.getElementById('f_pubType').value, contenu: document.getElementById('f_pubContenu').value.trim(),
    auteur: currentProfile.nom, date: new Date().toISOString().slice(0,10), createdAt: Date.now(), vuPar: {}
  });
  logAction('Publication', titre);
  notifyAllMinisteres(`Nouvelle publication disponible sur PAEDS : "${titre}". Veuillez vous connecter pour la consulter.`, 'publication');
  toast('Publication envoyée à tous les responsables.','ok');
  closeModal();
  render_publications();
}
async function notifyAllMinisteres(message, type){
  const snap = await R('ministeres').once('value');
  snap.forEach(c=>{
    const m = c.val();
    if(m.statut === 'suspendu') return;
    queueWhatsApp(m.nom, m.whatsapp||m.telephone, message, type);
  });
}
async function markPublicationSeen(id){
  await R('publications/'+id+'/vuPar/'+currentUser.uid).set(Date.now());
}

/* ====================== RENCONTRES ====================== */
async function render_rencontres(){
  const el = document.getElementById('contentArea');
  el.innerHTML = '<div class="empty-state"><p>Chargement…</p></div>';
  const snap = await R('rencontres').once('value');
  let list = []; snap.forEach(c=>list.push({id:c.key,...c.val()}));
  list.sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  el.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
      ${(isAdmin()||isPasteur())?`<button class="btn btn-gold" onclick="openMeetingForm()">+ Nouvelle rencontre</button>`:''}
    </div>
    ${list.length ? list.map(m=>meetingCardHtml(m)).join('') : `<div class="empty-state"><div class="ic">🤝</div><p>Aucune rencontre programmée.</p></div>`}
  `;
}
function meetingCardHtml(m){
  const myStatus = m.confirmations && m.confirmations[currentUser.uid];
  return `<div class="panel">
    <h3 style="margin:0 0 6px;font-size:15.5px;">${esc(m.titre)}</h3>
    <div style="font-size:12.5px;color:var(--ink-faint);margin-bottom:10px;">${fmtDate(m.date)} ${m.heure?'à '+m.heure:''} · ${esc(m.lieu||'—')}</div>
    ${m.objectif?`<p style="color:var(--ink-dim);font-size:13px;">${esc(m.objectif)}</p>`:''}
    ${isResponsable()?`
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn ${myStatus==='Présent'?'btn-gold':'btn-ghost'} btn-sm" onclick="confirmMeeting('${m.id}','Présent')">Présent</button>
      <button class="btn ${myStatus==='Absent'?'btn-gold':'btn-ghost'} btn-sm" onclick="confirmMeeting('${m.id}','Absent')">Absent</button>
      <button class="btn ${myStatus==='Excusé'?'btn-gold':'btn-ghost'} btn-sm" onclick="confirmMeeting('${m.id}','Excusé')">Excusé</button>
    </div>`:''}
  </div>`;
}
function openMeetingForm(){
  openModal(`
    <div class="modal-head"><h3>Nouvelle rencontre</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="field"><label>Titre</label><input id="f_rTitre" placeholder="Ex: Réunion du Comité Exécutif"></div>
      <div class="grid2">
        <div class="field"><label>Date</label><input type="date" id="f_rDate"></div>
        <div class="field"><label>Heure</label><input type="time" id="f_rHeure"></div>
      </div>
      <div class="field"><label>Lieu</label><input id="f_rLieu"></div>
      <div class="field"><label>Objectif / Ordre du jour</label><textarea id="f_rObjectif"></textarea></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-gold" onclick="saveMeeting()">Publier la rencontre</button>
    </div>
  `);
}
async function saveMeeting(){
  const titre = document.getElementById('f_rTitre').value.trim();
  if(!titre){ toast('Le titre est obligatoire.','err'); return; }
  const date = document.getElementById('f_rDate').value;
  await R('rencontres').push({
    titre, date, heure: document.getElementById('f_rHeure').value,
    lieu: document.getElementById('f_rLieu').value.trim(), objectif: document.getElementById('f_rObjectif').value.trim(),
    confirmations: {}, createdAt: Date.now()
  });
  logAction('Nouvelle rencontre', titre);
  notifyAllMinisteres(`Nouvelle rencontre programmée : "${titre}" le ${fmtDate(date)}. Merci de confirmer votre présence sur PAEDS.`, 'rencontre');
  toast('Rencontre publiée.','ok');
  closeModal();
  render_rencontres();
}
async function confirmMeeting(id, statut){
  await R('rencontres/'+id+'/confirmations/'+currentUser.uid).set(statut);
  toast('Réponse enregistrée : '+statut,'ok');
  render_rencontres();
}

/* ====================== JOURNAL D'AUDIT ====================== */
async function render_journal(){
  const el = document.getElementById('contentArea');
  if(!isAdmin()){ el.innerHTML = '<div class="empty-state"><p>Accès réservé à l\'administrateur.</p></div>'; return; }
  el.innerHTML = '<div class="empty-state"><p>Chargement…</p></div>';
  const snap = await R('journal').limitToLast(200).once('value');
  let list = []; snap.forEach(c=>list.push({id:c.key,...c.val()}));
  list.reverse();
  el.innerHTML = `<div class="panel"><div class="table-wrap"><table><thead><tr><th>Date</th><th>Utilisateur</th><th>Action</th><th>Détails</th></tr></thead><tbody>
    ${list.length ? list.map(j=>`<tr><td>${fmtDateTime(new Date(j.ts).toISOString())}</td><td>${esc(j.nom)}</td><td>${esc(j.action)}</td><td>${esc(j.details||'')}</td></tr>`).join('') : `<tr><td colspan="4"><div class="empty-state"><p>Aucune entrée.</p></div></td></tr>`}
  </tbody></table></div></div>`;
}

/* ====================== NOTIFICATIONS WHATSAPP (panneau admin) ====================== */
async function render_notifications(){
  const el = document.getElementById('contentArea');
  if(!isAdmin()){ el.innerHTML = '<div class="empty-state"><p>Accès réservé à l\'administrateur.</p></div>'; return; }
  el.innerHTML = '<div class="empty-state"><p>Chargement…</p></div>';

  const [queueSnap, cfgSnap] = await Promise.all([
    R('notifications_whatsapp').limitToLast(100).once('value'),
    R('config/whatsappWebhookUrl').once('value')
  ]);
  let list = []; queueSnap.forEach(c=>list.push({id:c.key,...c.val()}));
  list.reverse();
  const webhookUrl = cfgSnap.val() || '';
  const enAttente = list.filter(n=>n.statut==='en_attente');

  el.innerHTML = `
    <div class="panel">
      <div class="panel-head"><h3>Automatisation (facultatif)</h3></div>
      <p style="font-size:12.5px;color:var(--ink-dim);">Si vous configurez un webhook (Cloud Function, Make.com, Zapier…) relié à l'API WhatsApp Business, chaque message sera envoyé automatiquement. Sans webhook, les messages restent en file pour envoi manuel.</p>
      <div class="field" style="margin-top:10px;"><label>URL du webhook</label><input id="f_webhookUrl" value="${esc(webhookUrl)}" placeholder="https://..."></div>
      <button class="btn btn-gold btn-sm" onclick="saveWebhookUrl()">Enregistrer</button>
    </div>
    <div class="panel">
      <div class="panel-head"><h3>File d'attente (${enAttente.length} en attente)</h3></div>
      ${list.length ? `<div class="table-wrap"><table><thead><tr><th>Destinataire</th><th>Type</th><th>Message</th><th>Statut</th><th></th></tr></thead><tbody>
        ${list.map(n=>`<tr>
          <td><b style="color:var(--ink);">${esc(n.destinataireNom)}</b>${n.telephone?`<br><span style="font-size:11px;color:var(--ink-faint);">${esc(n.telephone)}</span>`:''}</td>
          <td><span class="badge badge-mute">${esc(n.type||'—')}</span></td>
          <td style="max-width:260px;font-size:12px;">${esc(n.message)}</td>
          <td>${n.statut==='envoye_auto'?'<span class="badge badge-ok">Envoyé (auto)</span>':n.statut==='envoye'?'<span class="badge badge-ok">Envoyé</span>':'<span class="badge badge-warn">En attente</span>'}</td>
          <td style="white-space:nowrap;">
            <button class="btn btn-ghost btn-sm" onclick="copyWhatsAppMessage('${n.id}')">📋 Copier</button>
            ${n.statut==='en_attente'?`<button class="btn btn-ghost btn-sm" onclick="markNotifSent('${n.id}')">✓ Envoyé</button>`:''}
          </td>
        </tr>`).join('')}
      </tbody></table></div>` : `<div class="empty-state"><div class="ic">💬</div><p>Aucune notification pour le moment.</p></div>`}
    </div>
  `;
  window._notifCache = list;
}
async function saveWebhookUrl(){
  const url = document.getElementById('f_webhookUrl').value.trim();
  await R('config/whatsappWebhookUrl').set(url);
  logAction('Configuration webhook WhatsApp', url?'défini':'supprimé');
  toast('Configuration enregistrée.','ok');
}
function copyWhatsAppMessage(id){
  const n = (window._notifCache||[]).find(x=>x.id===id);
  if(!n) return;
  const text = n.telephone ? `${n.message}` : n.message;
  navigator.clipboard.writeText(text).then(()=>toast('Message copié — collez-le dans WhatsApp.','ok')).catch(()=>toast('Impossible de copier automatiquement.','err'));
}
async function markNotifSent(id){
  await R('notifications_whatsapp/'+id).update({statut:'envoye', envoyePar: currentProfile.nom, envoyeAt: Date.now()});
  toast('Marqué comme envoyé.','ok');
  render_notifications();
}
</script>
</body>
